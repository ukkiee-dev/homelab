apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: homelab
spec:
  project: apps
  sources:
    # Helm chart
    - chart: postgresql
      repoURL: https://charts.bitnami.com/bitnami
      targetRevision: "18.*"
      helm:
        valueFiles:
          - $values/manifests/apps/postgresql/values.yaml
    # Kustomize (backup CronJob)
    - repoURL: https://github.com/ukkiee-dev/homelab.git
      targetRevision: main
      path: manifests/apps/postgresql
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
