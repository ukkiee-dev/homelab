apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pokopia-wiki
  namespace: argocd
  labels:
    app.kubernetes.io/name: pokopia-wiki
    app.kubernetes.io/component: wiki
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  # CNPG Cluster 는 manifest 자체이므로 single source (Helm chart 없음, Git-only)
  source:
    repoURL: https://github.com/ukkiee-dev/homelab.git
    targetRevision: main
    path: manifests/apps/pokopia-wiki
  destination:
    server: https://kubernetes.default.svc
    namespace: pokopia-wiki
  # v0.4 리뷰 P7 활성화 (2026-04-21 Phase 6 drift 관찰 후):
  # CNPG operator 가 Cluster spec 에 default 값 자동 채움.
  #
  # managedFieldsManagers 시도했으나 kubectl get cluster 의 metadata.managedFields 가 null →
  # SSA manager 이름 기반 필터 무효. jsonPointers/jqPathExpressions 로 개별 경로 명시.
  #
  # 메모리 `project_traefik_helm_v39_gomemlimit_ssa` 패턴 연장 — operator 자동 주입 필드 명시적 무시.
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      name: pokopia-wiki-pg
      namespace: pokopia-wiki
      jsonPointers:
        - /spec/affinity
        - /spec/bootstrap
        - /spec/enablePDB
        - /spec/enableSuperuserAccess
        - /spec/failoverDelay
        - /spec/logLevel
        - /spec/maxSyncReplicas
        - /spec/minSyncReplicas
      jqPathExpressions:
        # CNPG 가 managed.roles 에 connectionLimit=-1, inherit=true 자동 추가
        - '.spec.managed.roles[].connectionLimit'
        - '.spec.managed.roles[].inherit'
        # monitoring 블록에 default queries configmap · disableDefaultQueries=false 자동 추가
        - '.spec.monitoring.customQueriesConfigMap'
        - '.spec.monitoring.disableDefaultQueries'
        # plugins[].enabled=true 자동 추가
        - '.spec.plugins[].enabled'
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
