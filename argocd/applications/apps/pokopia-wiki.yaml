apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pokopia-wiki
  namespace: argocd
  labels:
    app.kubernetes.io/name: pokopia-wiki
    app.kubernetes.io/component: wiki
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  # CNPG Cluster 는 manifest 자체이므로 single source (Helm chart 없음, Git-only)
  source:
    repoURL: https://github.com/ukkiee-dev/homelab.git
    targetRevision: main
    path: manifests/apps/pokopia-wiki
  destination:
    server: https://kubernetes.default.svc
    namespace: pokopia-wiki
  # v0.4 리뷰 P7 활성화 (2026-04-21 Phase 6 drift 관찰 후):
  # CNPG operator 가 SSA 로 Cluster spec 에 default 값 자동 채움 — affinity, bootstrap.initdb,
  # enablePDB, enableSuperuserAccess, failoverDelay, logLevel, managed.roles[].connectionLimit/inherit,
  # maxSyncReplicas/minSyncReplicas, monitoring.customQueriesConfigMap/disableDefaultQueries,
  # plugins[].enabled 등.
  #
  # 개별 경로 나열 대신 managedFieldsManagers 로 operator SSA 관리 필드 전체 제외.
  # 메모리 `project_traefik_helm_v39_gomemlimit_ssa` 정신과 일관 (SSA ownership 충돌 회피).
  ignoreDifferences:
    - group: postgresql.cnpg.io
      kind: Cluster
      name: pokopia-wiki-pg
      namespace: pokopia-wiki
      managedFieldsManagers:
        - cloudnative-pg
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
