apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dozzle
  namespace: argocd
  labels:
    app.kubernetes.io/name: dozzle
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ukkiee-dev/homelab.git
    targetRevision: main
    path: k8s/base/dozzle
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
