apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: tailscale-operator
    app.kubernetes.io/component: vpn
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  sources:
    - chart: tailscale-operator
      repoURL: https://pkgs.tailscale.com/helmcharts
      targetRevision: "1.*"
      helm:
        valueFiles:
          - $values/k8s/base/tailscale-operator/values.yaml
    - repoURL: https://github.com/ukkiee-dev/homelab.git
      targetRevision: main
      path: k8s/base/tailscale-operator
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale-system
  # NOTE: 자동 sync 비활성화 — operator-oauth Secret 생성 후 automated 블록 복원할 것
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
