name: Setup App in Homelab
description: Terraform(DNS) + Tunnel API + 매니페스트 생성 → git push

inputs:
  app-name:             { required: true }
  subdomain:            { required: false, default: "" }
  service-name:         { required: false, default: "",  description: "모노레포 서비스 이름. 비면 flat 앱(기존), 있으면 manifests/apps/<app>/services/<service>/ 경로로 생성." }
  # Phase 2: caller 측 파싱 — .app-config.yml 내용 문자열. 비어있으면 deprecated inputs 로 fallback.
  config-yaml:          { required: false, default: "",  description: ".app-config.yml 내용 (caller 가 읽어 전달). 비어있으면 deprecated inputs 로 fallback." }
  app-token:            { required: true }
  tf-cloudflare-token:  { required: true }
  tf-zone-id:           { required: true }
  tf-tunnel-id:         { required: true }
  tf-account-id:        { required: true }
  r2-access-key-id:     { required: true }
  r2-secret-access-key: { required: true }
  domain:               { required: false, default: "ukkiee.dev" }
  # ── Deprecated: Phase 3b 에서 제거. config-yaml 전달 시 모두 무시됨. ──
  type:                 { required: false, default: "",      description: "(deprecated) .app-config.yml.type 으로 대체. config-yaml 비었을 때만 fallback 참조." }
  port:                 { required: false, default: "0",     description: "(deprecated) type 기반 자동 매핑으로 대체됨. 값을 넘겨도 무시됨." }
  health:               { required: false, default: "",      description: "(deprecated) .app-config.yml.health 로 대체." }
  icon:                 { required: false, default: "",      description: "(deprecated) .app-config.yml.icon 으로 대체." }
  description:          { required: false, default: "",      description: "(deprecated) .app-config.yml.description 으로 대체." }
  database-enabled:       { required: false, default: "false", description: "(deprecated) .app-config.yml.database 블록으로 대체." }
  database-mode:          { required: false, default: "none",  description: "(deprecated) .app-config.yml.database.name/ref 이분법으로 대체." }
  database-name:          { required: false, default: "",      description: "(deprecated) .app-config.yml.database.name 으로 대체." }
  database-role:          { required: false, default: "",      description: "role 이름 (비면 service-name 또는 app-name)" }
  database-ref:           { required: false, default: "",      description: "(deprecated) .app-config.yml.database.ref 로 대체." }
  database-storage:       { required: false, default: "10Gi",  description: "(deprecated) .app-config.yml.database.storage 로 대체." }
  database-pg-image-tag:  { required: false, default: "16.13-standard-trixie", description: "CNPG postgres image tag" }

outputs:
  tunnel-status:
    description: "tunnel API 결과 (success/failure)"
    value: ${{ steps.tunnel.outcome }}

runs:
  using: composite
  steps:
    - name: Checkout homelab
      uses: actions/checkout@v4
      with:
        repository: ukkiee-dev/homelab
        token: ${{ inputs.app-token }}
        path: _homelab

    # ── yq 설치 (Parse config + 매니페스트 YAML 정규화용) ──────────
    # 리뷰 M4: Parse config step 이 yq 를 사용하므로 Update apps.json 전에 설치.
    - name: Install yq
      uses: mikefarah/yq@v4

    # ── Parse config (.app-config.yml 또는 deprecated inputs) ───────
    # 리뷰 C1: caller (앱 레포) 가 읽어 전달한 config-yaml 문자열을 파싱.
    # 리뷰 M5: hybrid — config-yaml 비어있으면 deprecated inputs (type/health/icon/db-*) 로 fallback.
    # 이후 모든 step 은 steps.config.outputs.* 를 사용 (type/health/icon/description/db-mode/db-name/db-ref/db-storage).
    - name: Parse config (.app-config.yml 또는 deprecated inputs)
      id: config
      shell: bash
      env:
        APP_NAME: ${{ inputs.app-name }}
        APP_TOKEN: ${{ inputs.app-token }}
        CONFIG_YAML: ${{ inputs.config-yaml }}
        IN_TYPE: ${{ inputs.type }}
        IN_HEALTH: ${{ inputs.health }}
        IN_ICON: ${{ inputs.icon }}
        IN_DESCRIPTION: ${{ inputs.description }}
        IN_DB_ENABLED: ${{ inputs.database-enabled }}
        IN_DB_MODE: ${{ inputs.database-mode }}
        IN_DB_NAME: ${{ inputs.database-name }}
        IN_DB_REF: ${{ inputs.database-ref }}
        IN_DB_STORAGE: ${{ inputs.database-storage }}
      run: |
        set -euo pipefail

        if [ -n "$CONFIG_YAML" ]; then
          echo "::notice::config-yaml 전달받음 — .app-config.yml 우선 파싱"
          CONFIG_FILE=$(mktemp)
          printf '%s\n' "$CONFIG_YAML" > "$CONFIG_FILE"

          RAW_TYPE=$(yq '.type // ""' "$CONFIG_FILE")
          HEALTH=$(yq '.health // "/health"' "$CONFIG_FILE")
          ICON=$(yq '.icon // "mdi-application"' "$CONFIG_FILE")
          DESCRIPTION=$(yq '.description // ""' "$CONFIG_FILE")
          DB_NAME=$(yq '.database.name // ""' "$CONFIG_FILE")
          DB_REF=$(yq '.database.ref // ""' "$CONFIG_FILE")
          DB_STORAGE=$(yq '.database.storage // "10Gi"' "$CONFIG_FILE")
          rm -f "$CONFIG_FILE"
        else
          echo "::warning::config-yaml 비어있음 — deprecated inputs 로 fallback (Phase 3b 이전 caller)"
          RAW_TYPE="${IN_TYPE:-}"
          HEALTH="${IN_HEALTH:-/health}"
          ICON="${IN_ICON:-mdi-application}"
          DESCRIPTION="$IN_DESCRIPTION"
          if [ "$IN_DB_ENABLED" = "true" ]; then
            if [ "$IN_DB_MODE" = "owner" ]; then
              DB_NAME="$IN_DB_NAME"; DB_REF=""
            elif [ "$IN_DB_MODE" = "reference" ]; then
              DB_NAME=""; DB_REF="$IN_DB_REF"
            else
              DB_NAME=""; DB_REF=""
            fi
          else
            DB_NAME=""; DB_REF=""
          fi
          DB_STORAGE="${IN_DB_STORAGE:-10Gi}"
        fi

        # D2 변형: type 필드 → 내부 키 결정
        #   ""             → http  (HTTP service, 기본)
        #   "worker"       → worker
        #   "web"|"static" → http (deprecated warning + 동일 처리)
        #   기타           → error
        case "$RAW_TYPE" in
          "")     TYPE=http ;;
          worker) TYPE=worker ;;
          web|static)
            echo "::warning::type: $RAW_TYPE 은 deprecated. type 필드 생략 시 HTTP service 기본 (web/static 동일 처리)"
            TYPE=http
            ;;
          *)
            echo "::error::invalid type: $RAW_TYPE. type 필드 생략 (HTTP) 또는 'worker' 만 허용"
            exit 1
            ;;
        esac

        if [ "$TYPE" = "worker" ] && [ -n "$HEALTH" ] && [ "$HEALTH" != "/health" ]; then
          echo "::warning::type: worker 에서 health 값 무시됨 (IngressRoute 없음)"
        fi
        if [ "$TYPE" = "worker" ] && { { [ -n "$ICON" ] && [ "$ICON" != "mdi-application" ]; } || [ -n "$DESCRIPTION" ]; }; then
          echo "::warning::type: worker 는 Homepage 에 표시되지 않아 icon/description 이 사용되지 않습니다"
        fi

        # DB 모드 결정 + 상호 배타 검증
        if [ -n "$DB_NAME" ] && [ -n "$DB_REF" ]; then
          echo "::error::database.name 과 database.ref 는 상호 배타"
          exit 1
        elif [ -n "$DB_NAME" ]; then
          DB_MODE=owner
        elif [ -n "$DB_REF" ]; then
          DB_MODE=reference
        else
          DB_MODE=none
        fi

        # description fallback — 빈 문자열이면 repo description fetch (기본값 APP_NAME)
        if [ -z "$DESCRIPTION" ]; then
          if [ -n "$APP_TOKEN" ] && [ -n "$APP_NAME" ]; then
            DESCRIPTION=$(curl -s -H "Authorization: Bearer $APP_TOKEN" \
              "https://api.github.com/repos/ukkiee-dev/${APP_NAME}" \
              | yq -p json '.description // ""') || DESCRIPTION=""
          fi
          if [ -z "$DESCRIPTION" ] || [ "$DESCRIPTION" = "null" ]; then
            DESCRIPTION="$APP_NAME"
          fi
        fi

        {
          echo "type=$TYPE"
          echo "health=$HEALTH"
          echo "icon=$ICON"
          echo "description=$DESCRIPTION"
          echo "db-mode=$DB_MODE"
          echo "db-name=$DB_NAME"
          echo "db-ref=$DB_REF"
          echo "db-storage=$DB_STORAGE"
        } >> "$GITHUB_OUTPUT"

        echo "── Parse config 결과 ──────────────────"
        echo "  type=$TYPE"
        echo "  health=$HEALTH"
        echo "  icon=$ICON"
        echo "  description=$DESCRIPTION"
        echo "  db-mode=$DB_MODE"
        if [ "$DB_MODE" != "none" ]; then
          echo "  db-name=$DB_NAME db-ref=$DB_REF db-storage=$DB_STORAGE"
        fi

    # ── Step 1: apps.json + Terraform DNS (worker는 스킵) ──────────
    # worker 타입은 DNS가 불필요하므로 apps.json 수정과 terraform을 건너뜀
    # Tunnel ingress는 Step 2.5에서 Cloudflare API로 자동 추가
    - name: Update apps.json & Terraform
      if: ${{ steps.config.outputs.type != 'worker' }}
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
        SERVICE: ${{ inputs.service-name }}
        SUBDOMAIN: ${{ inputs.subdomain }}
      run: |
        set -euo pipefail
        # apps.json 엔트리 키 규약:
        #   flat 앱          → "<app>"
        #   모노레포 서비스  → "<app>-<service>"
        # 키는 dns.tf for_each의 식별자일 뿐이며 실제 DNS 레코드는 value.subdomain.
        KEY="$APP"
        if [ -n "$SERVICE" ]; then
          KEY="${APP}-${SERVICE}"
        fi
        APPS_JSON="_homelab/terraform/apps.json"

        EXISTS=$(jq --arg name "$KEY" 'has($name)' "$APPS_JSON")
        if [ "$EXISTS" = "true" ]; then
          echo "⏭️  apps.json: $KEY 이미 존재, 스킵"
        else
          jq --arg name "$KEY" --arg sub "$SUBDOMAIN" \
            '. + {($name): {subdomain: $sub}}' \
            "$APPS_JSON" > /tmp/apps.json
          jq empty /tmp/apps.json
          mv /tmp/apps.json "$APPS_JSON"
          echo "✅ apps.json: $KEY ($SUBDOMAIN) 추가됨"
        fi

    - name: Setup Terraform
      if: ${{ steps.config.outputs.type != 'worker' }}
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    - name: Terraform Init
      if: ${{ steps.config.outputs.type != 'worker' }}
      shell: bash
      working-directory: _homelab/terraform
      run: |
        terraform init \
          -backend-config="endpoint=https://${{ inputs.tf-account-id }}.r2.cloudflarestorage.com" \
          -backend-config="access_key=${{ inputs.r2-access-key-id }}" \
          -backend-config="secret_key=${{ inputs.r2-secret-access-key }}"

    - name: Terraform Plan
      if: ${{ steps.config.outputs.type != 'worker' }}
      shell: bash
      working-directory: _homelab/terraform
      run: terraform plan -out=tfplan
      env:
        TF_VAR_cloudflare_api_token: ${{ inputs.tf-cloudflare-token }}
        TF_VAR_zone_id:              ${{ inputs.tf-zone-id }}
        TF_VAR_tunnel_id:            ${{ inputs.tf-tunnel-id }}
        TF_VAR_account_id:           ${{ inputs.tf-account-id }}
        TF_VAR_domain:               ${{ inputs.domain }}

    - name: Terraform Apply
      if: ${{ steps.config.outputs.type != 'worker' }}
      shell: bash
      working-directory: _homelab/terraform
      run: terraform apply tfplan
      env:
        TF_VAR_cloudflare_api_token: ${{ inputs.tf-cloudflare-token }}
        TF_VAR_zone_id:              ${{ inputs.tf-zone-id }}
        TF_VAR_tunnel_id:            ${{ inputs.tf-tunnel-id }}
        TF_VAR_account_id:           ${{ inputs.tf-account-id }}
        TF_VAR_domain:               ${{ inputs.domain }}

    # ── Step 2.5: Tunnel Ingress 추가 (API 직접 호출) ────────────
    # continue-on-error: 실패해도 apps.json/terraform 변경은 push해야 함
    # (안 그러면 다른 앱 setup에서 이 앱의 DNS가 삭제됨)
    - name: Add tunnel ingress
      id: tunnel
      if: ${{ steps.config.outputs.type != 'worker' }}
      continue-on-error: true
      shell: bash
      env:
        CF_TOKEN: ${{ inputs.tf-cloudflare-token }}
        ACCOUNT_ID: ${{ inputs.tf-account-id }}
        TUNNEL_ID: ${{ inputs.tf-tunnel-id }}
        TUNNEL_HOSTNAME: "${{ inputs.subdomain }}.${{ inputs.domain }}"
      run: |
        bash _homelab/.github/scripts/manage-tunnel-ingress.sh add "$TUNNEL_HOSTNAME"

    # ── Step 3: k8s 매니페스트 생성 (tunnel 성공 시에만) ─────────
    # service-name이 비어있으면 flat 앱(기존 동작). 모노레포 서비스는 아래 별도 step.
    - name: Create manifests
      if: ${{ (steps.tunnel.outcome == 'success' || steps.config.outputs.type == 'worker') && inputs.service-name == '' }}
      shell: bash
      env:
        APP_TOKEN: ${{ inputs.app-token }}
      run: |
        set -euo pipefail
        APP="${{ inputs.app-name }}"
        TYPE="${{ steps.config.outputs.type }}"
        SUBDOMAIN="${{ inputs.subdomain }}"
        DOMAIN="${{ inputs.domain }}"
        ICON="${{ steps.config.outputs.icon }}"
        DESCRIPTION="${{ steps.config.outputs.description }}"
        HEALTH_PATH="${{ steps.config.outputs.health }}"

        # D1/D2 변형: http(web·static 통합, port 3000) + worker 만.
        case "$TYPE" in
          http)
            PORT=3000
            MEMORY_REQUEST="128Mi"
            MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m"
            CPU_LIMIT="200m"
            [ -z "$HEALTH_PATH" ] && HEALTH_PATH="/health"
            ;;
          worker)
            PORT=0
            MEMORY_REQUEST="128Mi"
            MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m"
            CPU_LIMIT="200m"
            ;;
          *)
            echo "::error::internal: unexpected TYPE=$TYPE (Parse config 에서 http|worker 만 방출해야 함)"
            exit 1
            ;;
        esac

        mkdir -p _homelab/manifests/apps/$APP

        # ── GHCR image pre-flight: initial replicas 결정 ──
        # 2026-04-21 test-phase7c incident 대응: 이미지 없이 replicas=1 로 배포하면
        # ArgoCD sync 직후 ImagePullBackOff 로 알람 노이즈 + 고아 Pod/ReplicaSet 생성.
        # 이미지 있으면 1, 없으면 0 으로 초기화. 첫 _update-image 호출 때 0->1 bump 된다.
        IMG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer $APP_TOKEN" \
          "https://api.github.com/orgs/ukkiee-dev/packages/container/${APP}")
        if [ "$IMG_STATUS" = "200" ]; then
          INITIAL_REPLICAS=1
          echo "OK  GHCR 이미지 확인 (${APP}) -> replicas=1 초기 배포"
        else
          INITIAL_REPLICAS=0
          echo "::warning::GHCR 이미지 미존재 (${APP}, HTTP ${IMG_STATUS}) -> replicas=0 초기 배포"
          echo "  첫 build workflow 가 _update-image 를 호출하면 replicas 0->1 로 자동 bump"
        fi

        # GHCR pull secret (SealedSecret) — namespace만 교체
        sed "s/__NAMESPACE__/$APP/g" \
          _homelab/.github/templates/ghcr-pull-secret.sealed.yaml \
          > _homelab/manifests/apps/$APP/ghcr-pull-secret.sealed.yaml

        cat > _homelab/manifests/apps/$APP/deployment.yaml << EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $APP
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
            app.kubernetes.io/version: latest
            app.kubernetes.io/component: $TYPE
            app.kubernetes.io/managed-by: argocd
        spec:
          revisionHistoryLimit: 3
          replicas: $INITIAL_REPLICAS
          selector:
            matchLabels:
              app.kubernetes.io/name: $APP
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 0
              maxSurge: 1
          template:
            metadata:
              labels:
                app.kubernetes.io/name: $APP
                app.kubernetes.io/version: latest
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              imagePullSecrets:
                - name: ghcr-pull-secret
              volumes:
                - name: tmp
                  emptyDir: {}
              containers:
                - name: $APP
                  image: ghcr.io/ukkiee-dev/$APP:latest
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop: ["ALL"]
                  volumeMounts:
                    - name: tmp
                      mountPath: /tmp
        EOF

        # worker가 아니면 port 추가
        if [ "$TYPE" != "worker" ]; then
          cat >> _homelab/manifests/apps/$APP/deployment.yaml << EOF
                  ports:
                    - name: http
                      containerPort: $PORT
                      protocol: TCP
        EOF
        fi

        # 공통: resources
        cat >> _homelab/manifests/apps/$APP/deployment.yaml << EOF
                  resources:
                    requests:
                      memory: "$MEMORY_REQUEST"
                      cpu: "$CPU_REQUEST"
                    limits:
                      memory: "$MEMORY_LIMIT"
                      cpu: "$CPU_LIMIT"
        EOF

        # worker가 아니면 probe 추가
        if [ "$TYPE" != "worker" ]; then
          cat >> _homelab/manifests/apps/$APP/deployment.yaml << EOF
                  startupProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 5
                    failureThreshold: 12
                  livenessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 20
                    timeoutSeconds: 5
                    failureThreshold: 5
                  readinessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
        EOF
        fi

        # NetworkPolicy 생성 (default-deny + allow-traefik)
        cat > _homelab/manifests/apps/$APP/networkpolicy.yaml << EOF
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: default-deny-all
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
            - Egress
          egress:
            - to: []
              ports:
                - protocol: UDP
                  port: 53
                - protocol: TCP
                  port: 53
        EOF

        if [ "$TYPE" != "worker" ]; then
          cat >> _homelab/manifests/apps/$APP/networkpolicy.yaml << EOF
        ---
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: allow-traefik-ingress
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: traefik-system
              ports:
                - protocol: TCP
                  port: $PORT
        EOF
        fi

        # worker: deployment 만, HTTP service: 전체 리소스
        if [ "$TYPE" = "worker" ]; then
          cat > _homelab/manifests/apps/$APP/kustomization.yaml << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ghcr-pull-secret.sealed.yaml
          - deployment.yaml
          - networkpolicy.yaml
        EOF
          # YAML 들여쓰기 정규화 (heredoc 8스페이스 제거)
          for f in _homelab/manifests/apps/$APP/*.yaml; do
            yq eval -i '.' "$f"
          done
          echo "✅ manifests 생성 완료 (type=worker, Service/IngressRoute 없음)"
        else
          cat > _homelab/manifests/apps/$APP/service.yaml << EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: $APP
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
        spec:
          selector:
            app.kubernetes.io/name: $APP
          ports:
            - port: $PORT
              targetPort: $PORT
        EOF

          cat > _homelab/manifests/apps/$APP/ingressroute.yaml << EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: $APP
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: "Apps"
            gethomepage.dev/name: "$APP"
            gethomepage.dev/icon: "$ICON"
            gethomepage.dev/href: "https://$SUBDOMAIN.$DOMAIN"
            gethomepage.dev/description: "$DESCRIPTION"
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=$APP"
        spec:
          entryPoints:
            - web
            - websecure
          routes:
            - match: Host(\`$SUBDOMAIN.$DOMAIN\`)
              kind: Rule
              middlewares:
                - name: security-headers
                  namespace: traefik-system
                - name: gzip
                  namespace: traefik-system
              services:
                - name: $APP
                  port: $PORT
        EOF

          cat > _homelab/manifests/apps/$APP/kustomization.yaml << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ghcr-pull-secret.sealed.yaml
          - deployment.yaml
          - service.yaml
          - ingressroute.yaml
          - networkpolicy.yaml
        EOF
          # YAML 들여쓰기 정규화 (heredoc 8스페이스 제거)
          for f in _homelab/manifests/apps/$APP/*.yaml; do
            yq eval -i '.' "$f"
          done
          echo "✅ manifests 생성 완료 (type=$TYPE)"
        fi

    # ── Step 3b: 모노레포 서비스 매니페스트 생성 ────────────────
    # service-name 있을 때만 실행. 같은 namespace(<app>)에 services/<service>/ 추가.
    # 첫 서비스 추가 시 common/ (프로젝트 shell) 도 자동 생성.
    - name: Create manifests (monorepo service)
      if: ${{ (steps.tunnel.outcome == 'success' || steps.config.outputs.type == 'worker') && inputs.service-name != '' }}
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
        SERVICE: ${{ inputs.service-name }}
        TYPE: ${{ steps.config.outputs.type }}
        SUBDOMAIN: ${{ inputs.subdomain }}
        DOMAIN: ${{ inputs.domain }}
        ICON_IN: ${{ steps.config.outputs.icon }}
        DESCRIPTION_IN: ${{ steps.config.outputs.description }}
        HEALTH_IN: ${{ steps.config.outputs.health }}
        APP_TOKEN: ${{ inputs.app-token }}
      run: |
        set -euo pipefail
        ICON="${ICON_IN:-mdi-application}"
        DESCRIPTION="${DESCRIPTION_IN:-$APP/$SERVICE}"
        HEALTH_PATH="$HEALTH_IN"

        # D1/D2 변형: http(web·static 통합, port 3000) + worker 만.
        case "$TYPE" in
          http)
            PORT=3000
            MEMORY_REQUEST="128Mi"; MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m";     CPU_LIMIT="200m"
            [ -z "$HEALTH_PATH" ] && HEALTH_PATH="/health"
            ;;
          worker)
            PORT=0
            MEMORY_REQUEST="128Mi"; MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m";     CPU_LIMIT="200m"
            ;;
          *)
            echo "::error::internal: unexpected TYPE=$TYPE (Parse config 에서 http|worker 만 방출해야 함)"
            exit 1
            ;;
        esac

        PROJECT_DIR="_homelab/manifests/apps/$APP"
        COMMON_DIR="$PROJECT_DIR/common"
        SVC_DIR="$PROJECT_DIR/services/$SERVICE"

        if [ -d "$SVC_DIR" ]; then
          echo "::error::이미 존재하는 서비스: $APP/$SERVICE"
          exit 1
        fi

        # ── common/ (프로젝트 shell) — 첫 서비스 추가 시에만 ──
        if [ ! -d "$COMMON_DIR" ]; then
          mkdir -p "$COMMON_DIR"

          sed "s/__NAMESPACE__/$APP/g" \
            _homelab/.github/templates/ghcr-pull-secret.sealed.yaml \
            > "$COMMON_DIR/ghcr-pull-secret.sealed.yaml"

          cat > "$COMMON_DIR/networkpolicy.yaml" << EOF
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: default-deny-all
          namespace: $APP
          labels:
            app.kubernetes.io/part-of: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
            - Egress
          egress:
            - to: []
              ports:
                - protocol: UDP
                  port: 53
                - protocol: TCP
                  port: 53
        ---
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: allow-traefik-ingress
          namespace: $APP
          labels:
            app.kubernetes.io/part-of: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: traefik-system
        EOF

          cat > "$COMMON_DIR/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ghcr-pull-secret.sealed.yaml
          - networkpolicy.yaml
        EOF

          echo "✅ 프로젝트 shell 생성: $COMMON_DIR"
        else
          echo "⏭️  common/ 이미 존재, 서비스만 추가"
        fi

        # ── services/<svc>/ ──────────────────────────────────
        mkdir -p "$SVC_DIR"

        # ── GHCR image pre-flight: initial replicas 결정 ──
        # 2026-04-21 test-phase7c incident 대응. 이미지명은 ${APP}-${SERVICE} 패턴.
        IMG_PKG="${APP}-${SERVICE}"
        IMG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer $APP_TOKEN" \
          "https://api.github.com/orgs/ukkiee-dev/packages/container/${IMG_PKG}")
        if [ "$IMG_STATUS" = "200" ]; then
          INITIAL_REPLICAS=1
          echo "OK  GHCR 이미지 확인 (${IMG_PKG}) -> replicas=1 초기 배포"
        else
          INITIAL_REPLICAS=0
          echo "::warning::GHCR 이미지 미존재 (${IMG_PKG}, HTTP ${IMG_STATUS}) -> replicas=0 초기 배포"
          echo "  첫 build workflow 가 _update-image 를 호출하면 replicas 0->1 로 자동 bump"
        fi

        cat > "$SVC_DIR/deployment.yaml" << EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $SERVICE
          namespace: $APP
          labels:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
            app.kubernetes.io/component: $TYPE
            app.kubernetes.io/version: latest
            app.kubernetes.io/managed-by: argocd
        spec:
          revisionHistoryLimit: 3
          replicas: $INITIAL_REPLICAS
          selector:
            matchLabels:
              app.kubernetes.io/name: $SERVICE
              app.kubernetes.io/part-of: $APP
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 0
              maxSurge: 1
          template:
            metadata:
              labels:
                app.kubernetes.io/name: $SERVICE
                app.kubernetes.io/part-of: $APP
                app.kubernetes.io/version: latest
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              imagePullSecrets:
                - name: ghcr-pull-secret
              volumes:
                - name: tmp
                  emptyDir: {}
              containers:
                - name: $SERVICE
                  image: ghcr.io/ukkiee-dev/${APP}-${SERVICE}:latest
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop: ["ALL"]
                  volumeMounts:
                    - name: tmp
                      mountPath: /tmp
        EOF

        if [ "$TYPE" != "worker" ]; then
          cat >> "$SVC_DIR/deployment.yaml" << EOF
                  ports:
                    - name: http
                      containerPort: $PORT
                      protocol: TCP
        EOF
        fi

        cat >> "$SVC_DIR/deployment.yaml" << EOF
                  resources:
                    requests:
                      memory: "$MEMORY_REQUEST"
                      cpu: "$CPU_REQUEST"
                    limits:
                      memory: "$MEMORY_LIMIT"
                      cpu: "$CPU_LIMIT"
        EOF

        if [ "$TYPE" != "worker" ]; then
          cat >> "$SVC_DIR/deployment.yaml" << EOF
                  startupProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 5
                    failureThreshold: 12
                  livenessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 20
                    timeoutSeconds: 5
                    failureThreshold: 5
                  readinessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
        EOF
        fi

        # Service + IngressRoute (HTTP service 만 — worker 는 skip)
        if [ "$TYPE" != "worker" ]; then
          cat > "$SVC_DIR/service.yaml" << EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: $SERVICE
          namespace: $APP
          labels:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
        spec:
          selector:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
          ports:
            - port: $PORT
              targetPort: $PORT
        EOF

          cat > "$SVC_DIR/ingressroute.yaml" << EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: $SERVICE
          namespace: $APP
          labels:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: "Apps"
            gethomepage.dev/name: "$APP/$SERVICE"
            gethomepage.dev/icon: "$ICON"
            gethomepage.dev/href: "https://$SUBDOMAIN.$DOMAIN"
            gethomepage.dev/description: "$DESCRIPTION"
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=$SERVICE"
        spec:
          entryPoints:
            - web
            - websecure
          routes:
            - match: Host(\`$SUBDOMAIN.$DOMAIN\`)
              kind: Rule
              middlewares:
                - name: security-headers
                  namespace: traefik-system
                - name: gzip
                  namespace: traefik-system
              services:
                - name: $SERVICE
                  port: $PORT
        EOF
        fi

        # 서비스 kustomization (worker 는 deployment 만, HTTP service 는 service/ingressroute 포함)
        if [ "$TYPE" != "worker" ]; then
          cat > "$SVC_DIR/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - deployment.yaml
          - service.yaml
          - ingressroute.yaml
        EOF
        else
          cat > "$SVC_DIR/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - deployment.yaml
        EOF
        fi

        # 루트 kustomization: 최초 생성 또는 services/<svc> 추가
        ROOT_KUST="$PROJECT_DIR/kustomization.yaml"
        if [ ! -f "$ROOT_KUST" ]; then
          cat > "$ROOT_KUST" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - common
          - services/$SERVICE
        EOF
          echo "✅ 루트 kustomization 신규 생성"
        else
          if ! yq eval '.resources[]' "$ROOT_KUST" | grep -q "^services/${SERVICE}$"; then
            yq eval -i ".resources += [\"services/$SERVICE\"]" "$ROOT_KUST"
            echo "✅ 루트 kustomization에 services/$SERVICE 추가"
          fi
        fi

        # YAML 들여쓰기 정규화 (heredoc 8스페이스 제거)
        for f in "$COMMON_DIR"/*.yaml "$SVC_DIR"/*.yaml "$ROOT_KUST"; do
          [ -f "$f" ] && yq eval -i '.' "$f"
        done

        echo "✅ monorepo manifests 생성 완료: $APP/$SERVICE (type=$TYPE)"

    - name: Create ArgoCD Application
      if: ${{ (steps.tunnel.outcome == 'success' || steps.config.outputs.type == 'worker') && inputs.service-name == '' }}
      shell: bash
      run: |
        set -euo pipefail
        APP="${{ inputs.app-name }}"

        cat > _homelab/argocd/applications/apps/$APP.yaml << EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: $APP
          namespace: argocd
          finalizers:
            - resources-finalizer.argocd.argoproj.io
          annotations:
            argocd.argoproj.io/sync-wave: "0"
        spec:
          project: apps
          source:
            repoURL: https://github.com/ukkiee-dev/homelab.git
            targetRevision: main
            path: manifests/apps/$APP
          destination:
            server: https://kubernetes.default.svc
            namespace: $APP
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
            retry:
              limit: 3
              backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
        EOF

        # YAML 들여쓰기 정규화
        yq eval -i '.' _homelab/argocd/applications/apps/$APP.yaml
        echo "✅ ArgoCD Application 생성 완료"

    # ── ArgoCD Application (monorepo) — 프로젝트 shell 최초 생성 시에만 ──
    # path는 manifests/apps/<app> 루트. 서비스 추가 시 ArgoCD가 루트 kustomization을
    # 따라가 자동 감지하므로 Application은 한 번만 만들면 된다.
    - name: Create ArgoCD Application (monorepo)
      if: ${{ (steps.tunnel.outcome == 'success' || steps.config.outputs.type == 'worker') && inputs.service-name != '' }}
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
      run: |
        set -euo pipefail
        APP_FILE="_homelab/argocd/applications/apps/$APP.yaml"
        if [ -f "$APP_FILE" ]; then
          echo "⏭️  ArgoCD Application 이미 존재 ($APP), 스킵"
          exit 0
        fi

        cat > "$APP_FILE" << EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: $APP
          namespace: argocd
          finalizers:
            - resources-finalizer.argocd.argoproj.io
          annotations:
            argocd.argoproj.io/sync-wave: "0"
        spec:
          project: apps
          source:
            repoURL: https://github.com/ukkiee-dev/homelab.git
            targetRevision: main
            path: manifests/apps/$APP
          destination:
            server: https://kubernetes.default.svc
            namespace: $APP
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
            retry:
              limit: 3
              backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
        EOF

        yq eval -i '.' "$APP_FILE"
        echo "✅ ArgoCD Application 생성 완료 (monorepo shell)"

    # ── Step 3c: CNPG DB 매니페스트 생성 ────────────────────────
    # Phase 2: db-mode 는 Parse config step 이 .app-config.yml.database.name/ref 로부터 결정.
    # Phase 6: owner + reference 모두 지원. 모노레포 (service-name 있음) 에서만 실행.
    # flat 앱은 현재 common/ 구조가 없어 database composite 와 충돌 가능 → 후속 확장에서 지원.
    - name: Warn if database configured on flat app
      if: steps.config.outputs.db-mode != 'none' && inputs.service-name == ''
      shell: bash
      run: |
        echo "::warning::database 블록은 현재 모노레포 (service-name 있음) 앱만 지원합니다. flat 앱 DB 는 향후 지원 예정. database composite step 을 skip 합니다."

    - name: Setup CNPG database (owner)
      if: steps.config.outputs.db-mode == 'owner' && inputs.service-name != ''
      uses: ukkiee-dev/homelab/.github/actions/setup-app/database@main
      with:
        app-name:             ${{ inputs.app-name }}
        service-name:         ${{ inputs.service-name }}
        mode:                 owner
        db-name:              ${{ steps.config.outputs.db-name }}
        ref-db:               ""
        role-name:            ${{ inputs.database-role }}
        pg-image-tag:         ${{ inputs.database-pg-image-tag }}
        storage:              ${{ steps.config.outputs.db-storage }}
        r2-account-id:        ${{ inputs.tf-account-id }}
        r2-access-key-id:     ${{ inputs.r2-access-key-id }}
        r2-secret-access-key: ${{ inputs.r2-secret-access-key }}
        homelab-path:         _homelab

    # Phase 6: reference 모드 — owner 의 common/database-shared.yaml 에서 db·role 추출 후
    # reference 서비스 Deployment 에 PG 표준 env 5개 주입 (owner role-secret 을 secretKeyRef 로 공유).
    - name: Setup CNPG database (reference)
      if: steps.config.outputs.db-mode == 'reference' && inputs.service-name != ''
      uses: ukkiee-dev/homelab/.github/actions/setup-app/database@main
      with:
        app-name:             ${{ inputs.app-name }}
        service-name:         ${{ inputs.service-name }}
        mode:                 reference
        db-name:              ""
        ref-db:               ${{ steps.config.outputs.db-ref }}
        role-name:            ""
        # reference 모드는 owner 가 이미 sealed 한 secret 을 재사용하므로 credentials·storage 전달 불필요
        r2-account-id:        ${{ inputs.tf-account-id }}
        r2-access-key-id:     ${{ inputs.r2-access-key-id }}
        r2-secret-access-key: ${{ inputs.r2-secret-access-key }}
        homelab-path:         _homelab

    - name: Update ArgoCD Application for DB common/ + ignoreDifferences
      if: steps.config.outputs.db-mode == 'owner' && inputs.service-name != ''
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
      run: |
        set -euo pipefail

        # 1. database composite 가 manifests/apps/<app>/common/ 을 생성 → 루트 kustomization 에 common/ 추가
        ROOT_KUST="_homelab/manifests/apps/$APP/kustomization.yaml"
        if [ -f "$ROOT_KUST" ]; then
          if ! yq eval '.resources[]' "$ROOT_KUST" | grep -qx "common"; then
            yq eval -i '.resources = (.resources + ["common"] | unique)' "$ROOT_KUST"
            echo "✅ 루트 kustomization 에 common/ 추가 (DB 매니페스트 참조)"
          else
            echo "⏭️  root kustomization 에 common/ 이미 존재"
          fi
        fi

        # 2. ArgoCD Application 에 CNPG Cluster ignoreDifferences 추가 (Phase 6 pokopia-wiki 드리프트 교훈, PR #14/#15)
        #    CNPG operator 가 Cluster spec 에 default 값 자동 채움 → ArgoCD OutOfSync 영구.
        #    managedFieldsManagers 는 managedFields=null 이라 무효 → jsonPointers/jqPathExpressions 로 개별 경로.
        APP_FILE="_homelab/argocd/applications/apps/$APP.yaml"
        if [ -f "$APP_FILE" ]; then
          CLUSTER_NAME="${APP}-pg"
          APP_NS="$APP" CLUSTER_NAME="$CLUSTER_NAME" yq eval -i '
            .spec.ignoreDifferences = ((.spec.ignoreDifferences // []) + [{
              "group": "postgresql.cnpg.io",
              "kind": "Cluster",
              "name": env(CLUSTER_NAME),
              "namespace": env(APP_NS),
              "jsonPointers": [
                "/spec/affinity",
                "/spec/bootstrap",
                "/spec/enablePDB",
                "/spec/enableSuperuserAccess",
                "/spec/failoverDelay",
                "/spec/logLevel",
                "/spec/maxSyncReplicas",
                "/spec/minSyncReplicas"
              ],
              "jqPathExpressions": [
                ".spec.managed.roles[].connectionLimit",
                ".spec.managed.roles[].inherit",
                ".spec.monitoring.customQueriesConfigMap",
                ".spec.monitoring.disableDefaultQueries",
                ".spec.plugins[].enabled"
              ]
            }] | unique_by(.kind + "/" + .name))
          ' "$APP_FILE"
          echo "✅ ArgoCD Application 에 CNPG Cluster ignoreDifferences 추가"
        fi

    # ── Step 3d: AppProject destinations 자동 업데이트 ────────────
    # Phase 6 pokopia-wiki 교훈: 새 앱 namespace 가 AppProject destinations 에 없으면
    # ArgoCD 가 "namespace X is not permitted in project Y" 로 sync 거부.
    #   - apps AppProject  : project=apps Application (CNPG 확장 등) 의 destination 허용
    #   - infra AppProject : scheduling Application (project=infra) 이 ResourceQuota/LimitRange 를
    #                         각 앱 namespace 에 배포하기 때문에 필수.
    # manifests/ 변경이므로 뒤의 Commit & Push 스텝이 `git add manifests/` 로 자동 반영.
    - name: Update AppProject destinations
      if: ${{ steps.tunnel.outcome == 'success' || steps.config.outputs.type == 'worker' }}
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
      run: |
        set -euo pipefail

        for proj_file in \
          _homelab/manifests/infra/argocd/appproject-apps.yaml \
          _homelab/manifests/infra/argocd/appproject-infra.yaml; do

          if [ ! -f "$proj_file" ]; then
            echo "⚠️  $proj_file 미존재, 스킵"
            continue
          fi

          EXISTS=$(NS="$APP" yq '.spec.destinations | map(.namespace == env(NS)) | any' "$proj_file")
          if [ "$EXISTS" = "true" ]; then
            echo "⏭️  $(basename "$proj_file"): $APP destination 이미 존재"
          else
            NS="$APP" yq eval -i \
              '.spec.destinations += [{"namespace": env(NS), "server": "https://kubernetes.default.svc"}]' \
              "$proj_file"
            echo "✅ $(basename "$proj_file"): $APP destination 추가"
          fi
        done

    # ── Step 4: git commit & push (terraform 완료 후) ─────────────
    - name: Commit & Push
      shell: bash
      env:
        TUNNEL_OUTCOME: ${{ steps.tunnel.outcome }}
        APP_NAME: ${{ inputs.app-name }}
        SUBDOMAIN: ${{ inputs.subdomain }}
        DOMAIN: ${{ inputs.domain }}
        APP_TYPE: ${{ steps.config.outputs.type }}
      run: |
        set -euo pipefail
        cd _homelab
        git config user.email "deploy-bot@users.noreply.github.com"
        git config user.name "deploy-bot[bot]"

        git add terraform/apps.json

        if [ "$TUNNEL_OUTCOME" = "success" ] || [ "$APP_TYPE" = "worker" ]; then
          git add manifests/ argocd/
        fi

        if git diff --staged --quiet; then
          echo "변경사항 없음, 커밋 스킵"
          exit 0
        fi

        if [ "$APP_TYPE" = "worker" ]; then
          git commit -m "feat: add $APP_NAME (worker)"
        elif [ "$TUNNEL_OUTCOME" = "success" ]; then
          git commit -m "feat: add $APP_NAME ($SUBDOMAIN.$DOMAIN)"
        else
          git commit -m "feat: add DNS for $APP_NAME ($SUBDOMAIN.$DOMAIN) — tunnel 실패, manifests 미생성"
        fi

        PUSHED=false
        for i in 1 2 3; do
          git rebase --abort 2>/dev/null || true
          git pull --rebase origin main && git push && PUSHED=true && break || {
            echo "push 실패 ($i/3), ${i}*5초 후 재시도..."
            sleep $((i * 5))
          }
        done

        if [ "$PUSHED" != "true" ]; then
          echo "3회 retry 후에도 push 실패"
          exit 1
        fi

        echo "homelab 레포 업데이트 완료"
