name: Setup App in Homelab
description: Terraform(DNS) + Tunnel API + 매니페스트 생성 → git push

inputs:
  app-name:             { required: true }
  type:                 { required: true }
  port:                 { required: false, default: "0", description: "(deprecated) type 기반 자동 매핑으로 대체됨. 값을 넘겨도 무시됨." }
  subdomain:            { required: false, default: "" }
  health:               { required: false }
  service-name:         { required: false, default: "",  description: "모노레포 서비스 이름. 비면 flat 앱(기존), 있으면 manifests/apps/<app>/services/<service>/ 경로로 생성." }
  app-token:            { required: true }
  tf-cloudflare-token:  { required: true }
  tf-zone-id:           { required: true }
  tf-tunnel-id:         { required: true }
  tf-account-id:        { required: true }
  r2-access-key-id:     { required: true }
  r2-secret-access-key: { required: true }
  domain:               { required: false, default: "ukkiee.dev" }
  icon:                 { required: false, default: "mdi-application" }
  description:          { required: false, default: "" }
  # Phase 7 B: CNPG DB inputs (default=false 면 DB composite step skip, 기존 앱 영향 0)
  database-enabled:       { required: false, default: "false", description: "CNPG DB 생성 여부" }
  database-mode:          { required: false, default: "none",  description: "owner | reference | none" }
  database-name:          { required: false, default: "",      description: "Database 이름 (mode=owner 필수)" }
  database-role:          { required: false, default: "",      description: "role 이름 (비면 service-name 또는 app-name)" }
  database-ref:           { required: false, default: "",      description: "참조 대상 owner 서비스 (mode=reference 전용)" }
  database-storage:       { required: false, default: "10Gi",  description: "PVC size (리뷰 M9)" }
  database-pg-image-tag:  { required: false, default: "16.13-standard-trixie", description: "CNPG postgres image tag" }

outputs:
  tunnel-status:
    description: "tunnel API 결과 (success/failure)"
    value: ${{ steps.tunnel.outcome }}

runs:
  using: composite
  steps:
    - name: Checkout homelab
      uses: actions/checkout@v4
      with:
        repository: ukkiee-dev/homelab
        token: ${{ inputs.app-token }}
        path: _homelab

    # ── Step 1: apps.json + Terraform DNS (worker는 스킵) ──────────
    # worker 타입은 DNS가 불필요하므로 apps.json 수정과 terraform을 건너뜀
    # Tunnel ingress는 Step 2.5에서 Cloudflare API로 자동 추가
    - name: Update apps.json & Terraform
      if: ${{ inputs.type != 'worker' }}
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
        SERVICE: ${{ inputs.service-name }}
        SUBDOMAIN: ${{ inputs.subdomain }}
      run: |
        set -euo pipefail
        # apps.json 엔트리 키 규약:
        #   flat 앱          → "<app>"
        #   모노레포 서비스  → "<app>-<service>"
        # 키는 dns.tf for_each의 식별자일 뿐이며 실제 DNS 레코드는 value.subdomain.
        KEY="$APP"
        if [ -n "$SERVICE" ]; then
          KEY="${APP}-${SERVICE}"
        fi
        APPS_JSON="_homelab/terraform/apps.json"

        EXISTS=$(jq --arg name "$KEY" 'has($name)' "$APPS_JSON")
        if [ "$EXISTS" = "true" ]; then
          echo "⏭️  apps.json: $KEY 이미 존재, 스킵"
        else
          jq --arg name "$KEY" --arg sub "$SUBDOMAIN" \
            '. + {($name): {subdomain: $sub}}' \
            "$APPS_JSON" > /tmp/apps.json
          jq empty /tmp/apps.json
          mv /tmp/apps.json "$APPS_JSON"
          echo "✅ apps.json: $KEY ($SUBDOMAIN) 추가됨"
        fi

    - name: Setup Terraform
      if: ${{ inputs.type != 'worker' }}
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    - name: Terraform Init
      if: ${{ inputs.type != 'worker' }}
      shell: bash
      working-directory: _homelab/terraform
      run: |
        terraform init \
          -backend-config="endpoint=https://${{ inputs.tf-account-id }}.r2.cloudflarestorage.com" \
          -backend-config="access_key=${{ inputs.r2-access-key-id }}" \
          -backend-config="secret_key=${{ inputs.r2-secret-access-key }}"

    - name: Terraform Plan
      if: ${{ inputs.type != 'worker' }}
      shell: bash
      working-directory: _homelab/terraform
      run: terraform plan -out=tfplan
      env:
        TF_VAR_cloudflare_api_token: ${{ inputs.tf-cloudflare-token }}
        TF_VAR_zone_id:              ${{ inputs.tf-zone-id }}
        TF_VAR_tunnel_id:            ${{ inputs.tf-tunnel-id }}
        TF_VAR_account_id:           ${{ inputs.tf-account-id }}
        TF_VAR_domain:               ${{ inputs.domain }}

    - name: Terraform Apply
      if: ${{ inputs.type != 'worker' }}
      shell: bash
      working-directory: _homelab/terraform
      run: terraform apply tfplan
      env:
        TF_VAR_cloudflare_api_token: ${{ inputs.tf-cloudflare-token }}
        TF_VAR_zone_id:              ${{ inputs.tf-zone-id }}
        TF_VAR_tunnel_id:            ${{ inputs.tf-tunnel-id }}
        TF_VAR_account_id:           ${{ inputs.tf-account-id }}
        TF_VAR_domain:               ${{ inputs.domain }}

    # ── Step 2.5: Tunnel Ingress 추가 (API 직접 호출) ────────────
    # continue-on-error: 실패해도 apps.json/terraform 변경은 push해야 함
    # (안 그러면 다른 앱 setup에서 이 앱의 DNS가 삭제됨)
    - name: Add tunnel ingress
      id: tunnel
      if: ${{ inputs.type != 'worker' }}
      continue-on-error: true
      shell: bash
      env:
        CF_TOKEN: ${{ inputs.tf-cloudflare-token }}
        ACCOUNT_ID: ${{ inputs.tf-account-id }}
        TUNNEL_ID: ${{ inputs.tf-tunnel-id }}
        TUNNEL_HOSTNAME: "${{ inputs.subdomain }}.${{ inputs.domain }}"
      run: |
        bash _homelab/.github/scripts/manage-tunnel-ingress.sh add "$TUNNEL_HOSTNAME"

    # ── yq 설치 (매니페스트 YAML 정규화용) ─────────────────────
    - name: Install yq
      uses: mikefarah/yq@v4

    # ── Step 3: k8s 매니페스트 생성 (tunnel 성공 시에만) ─────────
    # service-name이 비어있으면 flat 앱(기존 동작). 모노레포 서비스는 아래 별도 step.
    - name: Create manifests
      if: ${{ (steps.tunnel.outcome == 'success' || inputs.type == 'worker') && inputs.service-name == '' }}
      shell: bash
      run: |
        set -euo pipefail
        APP="${{ inputs.app-name }}"
        TYPE="${{ inputs.type }}"
        SUBDOMAIN="${{ inputs.subdomain }}"
        DOMAIN="${{ inputs.domain }}"
        ICON="${{ inputs.icon }}"
        [ -z "$ICON" ] && ICON="mdi-application"
        DESCRIPTION="${{ inputs.description }}"
        [ -z "$DESCRIPTION" ] && DESCRIPTION="$APP"

        HEALTH_PATH="${{ inputs.health }}"

        case "$TYPE" in
          static)
            PORT=8080
            MEMORY_REQUEST="64Mi"
            MEMORY_LIMIT="128Mi"
            CPU_REQUEST="50m"
            CPU_LIMIT="100m"
            [ -z "$HEALTH_PATH" ] && HEALTH_PATH="/"
            ;;
          web)
            PORT=3000
            MEMORY_REQUEST="128Mi"
            MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m"
            CPU_LIMIT="200m"
            [ -z "$HEALTH_PATH" ] && HEALTH_PATH="/health"
            ;;
          worker)
            PORT=0
            MEMORY_REQUEST="128Mi"
            MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m"
            CPU_LIMIT="200m"
            ;;
          *)
            echo "❌ Unknown type: $TYPE (static|web|worker)"
            exit 1
            ;;
        esac

        mkdir -p _homelab/manifests/apps/$APP

        # GHCR pull secret (SealedSecret) — namespace만 교체
        sed "s/__NAMESPACE__/$APP/g" \
          _homelab/.github/templates/ghcr-pull-secret.sealed.yaml \
          > _homelab/manifests/apps/$APP/ghcr-pull-secret.sealed.yaml

        cat > _homelab/manifests/apps/$APP/deployment.yaml << EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $APP
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
            app.kubernetes.io/version: latest
            app.kubernetes.io/component: $TYPE
            app.kubernetes.io/managed-by: argocd
        spec:
          revisionHistoryLimit: 3
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: $APP
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 0
              maxSurge: 1
          template:
            metadata:
              labels:
                app.kubernetes.io/name: $APP
                app.kubernetes.io/version: latest
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              imagePullSecrets:
                - name: ghcr-pull-secret
              volumes:
                - name: tmp
                  emptyDir: {}
              containers:
                - name: $APP
                  image: ghcr.io/ukkiee-dev/$APP:latest
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop: ["ALL"]
                  volumeMounts:
                    - name: tmp
                      mountPath: /tmp
        EOF

        # worker가 아니면 port 추가
        if [ "$TYPE" != "worker" ]; then
          cat >> _homelab/manifests/apps/$APP/deployment.yaml << EOF
                  ports:
                    - name: http
                      containerPort: $PORT
                      protocol: TCP
        EOF
        fi

        # 공통: resources
        cat >> _homelab/manifests/apps/$APP/deployment.yaml << EOF
                  resources:
                    requests:
                      memory: "$MEMORY_REQUEST"
                      cpu: "$CPU_REQUEST"
                    limits:
                      memory: "$MEMORY_LIMIT"
                      cpu: "$CPU_LIMIT"
        EOF

        # worker가 아니면 probe 추가
        if [ "$TYPE" != "worker" ]; then
          cat >> _homelab/manifests/apps/$APP/deployment.yaml << EOF
                  startupProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 5
                    failureThreshold: 12
                  livenessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 20
                    timeoutSeconds: 5
                    failureThreshold: 5
                  readinessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
        EOF
        fi

        # NetworkPolicy 생성 (default-deny + allow-traefik)
        cat > _homelab/manifests/apps/$APP/networkpolicy.yaml << EOF
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: default-deny-all
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
            - Egress
          egress:
            - to: []
              ports:
                - protocol: UDP
                  port: 53
                - protocol: TCP
                  port: 53
        EOF

        if [ "$TYPE" != "worker" ]; then
          cat >> _homelab/manifests/apps/$APP/networkpolicy.yaml << EOF
        ---
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: allow-traefik-ingress
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: traefik-system
              ports:
                - protocol: TCP
                  port: $PORT
        EOF
        fi

        # worker: deployment만, static/web: 전체 리소스
        if [ "$TYPE" = "worker" ]; then
          cat > _homelab/manifests/apps/$APP/kustomization.yaml << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ghcr-pull-secret.sealed.yaml
          - deployment.yaml
          - networkpolicy.yaml
        EOF
          # YAML 들여쓰기 정규화 (heredoc 8스페이스 제거)
          for f in _homelab/manifests/apps/$APP/*.yaml; do
            yq eval -i '.' "$f"
          done
          echo "✅ manifests 생성 완료 (type=worker, Service/IngressRoute 없음)"
        else
          cat > _homelab/manifests/apps/$APP/service.yaml << EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: $APP
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
        spec:
          selector:
            app.kubernetes.io/name: $APP
          ports:
            - port: $PORT
              targetPort: $PORT
        EOF

          cat > _homelab/manifests/apps/$APP/ingressroute.yaml << EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: $APP
          namespace: $APP
          labels:
            app.kubernetes.io/name: $APP
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: "Apps"
            gethomepage.dev/name: "$APP"
            gethomepage.dev/icon: "$ICON"
            gethomepage.dev/href: "https://$SUBDOMAIN.$DOMAIN"
            gethomepage.dev/description: "$DESCRIPTION"
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=$APP"
        spec:
          entryPoints:
            - web
            - websecure
          routes:
            - match: Host(\`$SUBDOMAIN.$DOMAIN\`)
              kind: Rule
              middlewares:
                - name: security-headers
                  namespace: traefik-system
                - name: gzip
                  namespace: traefik-system
              services:
                - name: $APP
                  port: $PORT
        EOF

          cat > _homelab/manifests/apps/$APP/kustomization.yaml << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ghcr-pull-secret.sealed.yaml
          - deployment.yaml
          - service.yaml
          - ingressroute.yaml
          - networkpolicy.yaml
        EOF
          # YAML 들여쓰기 정규화 (heredoc 8스페이스 제거)
          for f in _homelab/manifests/apps/$APP/*.yaml; do
            yq eval -i '.' "$f"
          done
          echo "✅ manifests 생성 완료 (type=$TYPE)"
        fi

    # ── Step 3b: 모노레포 서비스 매니페스트 생성 ────────────────
    # service-name 있을 때만 실행. 같은 namespace(<app>)에 services/<service>/ 추가.
    # 첫 서비스 추가 시 common/ (프로젝트 shell) 도 자동 생성.
    - name: Create manifests (monorepo service)
      if: ${{ (steps.tunnel.outcome == 'success' || inputs.type == 'worker') && inputs.service-name != '' }}
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
        SERVICE: ${{ inputs.service-name }}
        TYPE: ${{ inputs.type }}
        SUBDOMAIN: ${{ inputs.subdomain }}
        DOMAIN: ${{ inputs.domain }}
        ICON_IN: ${{ inputs.icon }}
        DESCRIPTION_IN: ${{ inputs.description }}
        HEALTH_IN: ${{ inputs.health }}
      run: |
        set -euo pipefail
        ICON="${ICON_IN:-mdi-application}"
        DESCRIPTION="${DESCRIPTION_IN:-$APP/$SERVICE}"
        HEALTH_PATH="$HEALTH_IN"

        case "$TYPE" in
          static)
            PORT=8080
            MEMORY_REQUEST="64Mi"; MEMORY_LIMIT="128Mi"
            CPU_REQUEST="50m";     CPU_LIMIT="100m"
            [ -z "$HEALTH_PATH" ] && HEALTH_PATH="/"
            ;;
          web)
            PORT=3000
            MEMORY_REQUEST="128Mi"; MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m";     CPU_LIMIT="200m"
            [ -z "$HEALTH_PATH" ] && HEALTH_PATH="/health"
            ;;
          worker)
            PORT=0
            MEMORY_REQUEST="128Mi"; MEMORY_LIMIT="256Mi"
            CPU_REQUEST="100m";     CPU_LIMIT="200m"
            ;;
          *)
            echo "❌ Unknown type: $TYPE (static|web|worker)"; exit 1 ;;
        esac

        PROJECT_DIR="_homelab/manifests/apps/$APP"
        COMMON_DIR="$PROJECT_DIR/common"
        SVC_DIR="$PROJECT_DIR/services/$SERVICE"

        if [ -d "$SVC_DIR" ]; then
          echo "::error::이미 존재하는 서비스: $APP/$SERVICE"
          exit 1
        fi

        # ── common/ (프로젝트 shell) — 첫 서비스 추가 시에만 ──
        if [ ! -d "$COMMON_DIR" ]; then
          mkdir -p "$COMMON_DIR"

          sed "s/__NAMESPACE__/$APP/g" \
            _homelab/.github/templates/ghcr-pull-secret.sealed.yaml \
            > "$COMMON_DIR/ghcr-pull-secret.sealed.yaml"

          cat > "$COMMON_DIR/networkpolicy.yaml" << EOF
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: default-deny-all
          namespace: $APP
          labels:
            app.kubernetes.io/part-of: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
            - Egress
          egress:
            - to: []
              ports:
                - protocol: UDP
                  port: 53
                - protocol: TCP
                  port: 53
        ---
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: allow-traefik-ingress
          namespace: $APP
          labels:
            app.kubernetes.io/part-of: $APP
            app.kubernetes.io/component: networking
            app.kubernetes.io/managed-by: argocd
        spec:
          podSelector: {}
          policyTypes:
            - Ingress
          ingress:
            - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: traefik-system
        EOF

          cat > "$COMMON_DIR/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - ghcr-pull-secret.sealed.yaml
          - networkpolicy.yaml
        EOF

          echo "✅ 프로젝트 shell 생성: $COMMON_DIR"
        else
          echo "⏭️  common/ 이미 존재, 서비스만 추가"
        fi

        # ── services/<svc>/ ──────────────────────────────────
        mkdir -p "$SVC_DIR"

        cat > "$SVC_DIR/deployment.yaml" << EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $SERVICE
          namespace: $APP
          labels:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
            app.kubernetes.io/component: $TYPE
            app.kubernetes.io/version: latest
            app.kubernetes.io/managed-by: argocd
        spec:
          revisionHistoryLimit: 3
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: $SERVICE
              app.kubernetes.io/part-of: $APP
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 0
              maxSurge: 1
          template:
            metadata:
              labels:
                app.kubernetes.io/name: $SERVICE
                app.kubernetes.io/part-of: $APP
                app.kubernetes.io/version: latest
            spec:
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                seccompProfile:
                  type: RuntimeDefault
              imagePullSecrets:
                - name: ghcr-pull-secret
              volumes:
                - name: tmp
                  emptyDir: {}
              containers:
                - name: $SERVICE
                  image: ghcr.io/ukkiee-dev/${APP}-${SERVICE}:latest
                  securityContext:
                    allowPrivilegeEscalation: false
                    readOnlyRootFilesystem: true
                    capabilities:
                      drop: ["ALL"]
                  volumeMounts:
                    - name: tmp
                      mountPath: /tmp
        EOF

        if [ "$TYPE" != "worker" ]; then
          cat >> "$SVC_DIR/deployment.yaml" << EOF
                  ports:
                    - name: http
                      containerPort: $PORT
                      protocol: TCP
        EOF
        fi

        cat >> "$SVC_DIR/deployment.yaml" << EOF
                  resources:
                    requests:
                      memory: "$MEMORY_REQUEST"
                      cpu: "$CPU_REQUEST"
                    limits:
                      memory: "$MEMORY_LIMIT"
                      cpu: "$CPU_LIMIT"
        EOF

        if [ "$TYPE" != "worker" ]; then
          cat >> "$SVC_DIR/deployment.yaml" << EOF
                  startupProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 5
                    failureThreshold: 12
                  livenessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 20
                    timeoutSeconds: 5
                    failureThreshold: 5
                  readinessProbe:
                    httpGet:
                      path: $HEALTH_PATH
                      port: http
                    periodSeconds: 10
                    timeoutSeconds: 5
                    failureThreshold: 3
        EOF
        fi

        # Service + IngressRoute (static/web만)
        if [ "$TYPE" = "static" ] || [ "$TYPE" = "web" ]; then
          cat > "$SVC_DIR/service.yaml" << EOF
        apiVersion: v1
        kind: Service
        metadata:
          name: $SERVICE
          namespace: $APP
          labels:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
        spec:
          selector:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
          ports:
            - port: $PORT
              targetPort: $PORT
        EOF

          cat > "$SVC_DIR/ingressroute.yaml" << EOF
        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: $SERVICE
          namespace: $APP
          labels:
            app.kubernetes.io/name: $SERVICE
            app.kubernetes.io/part-of: $APP
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: "Apps"
            gethomepage.dev/name: "$APP/$SERVICE"
            gethomepage.dev/icon: "$ICON"
            gethomepage.dev/href: "https://$SUBDOMAIN.$DOMAIN"
            gethomepage.dev/description: "$DESCRIPTION"
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=$SERVICE"
        spec:
          entryPoints:
            - web
            - websecure
          routes:
            - match: Host(\`$SUBDOMAIN.$DOMAIN\`)
              kind: Rule
              middlewares:
                - name: security-headers
                  namespace: traefik-system
                - name: gzip
                  namespace: traefik-system
              services:
                - name: $SERVICE
                  port: $PORT
        EOF
        fi

        # 서비스 kustomization
        if [ "$TYPE" = "static" ] || [ "$TYPE" = "web" ]; then
          cat > "$SVC_DIR/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - deployment.yaml
          - service.yaml
          - ingressroute.yaml
        EOF
        else
          cat > "$SVC_DIR/kustomization.yaml" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - deployment.yaml
        EOF
        fi

        # 루트 kustomization: 최초 생성 또는 services/<svc> 추가
        ROOT_KUST="$PROJECT_DIR/kustomization.yaml"
        if [ ! -f "$ROOT_KUST" ]; then
          cat > "$ROOT_KUST" << EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - common
          - services/$SERVICE
        EOF
          echo "✅ 루트 kustomization 신규 생성"
        else
          if ! yq eval '.resources[]' "$ROOT_KUST" | grep -q "^services/${SERVICE}$"; then
            yq eval -i ".resources += [\"services/$SERVICE\"]" "$ROOT_KUST"
            echo "✅ 루트 kustomization에 services/$SERVICE 추가"
          fi
        fi

        # YAML 들여쓰기 정규화 (heredoc 8스페이스 제거)
        for f in "$COMMON_DIR"/*.yaml "$SVC_DIR"/*.yaml "$ROOT_KUST"; do
          [ -f "$f" ] && yq eval -i '.' "$f"
        done

        echo "✅ monorepo manifests 생성 완료: $APP/$SERVICE (type=$TYPE)"

    - name: Create ArgoCD Application
      if: ${{ (steps.tunnel.outcome == 'success' || inputs.type == 'worker') && inputs.service-name == '' }}
      shell: bash
      run: |
        set -euo pipefail
        APP="${{ inputs.app-name }}"

        cat > _homelab/argocd/applications/apps/$APP.yaml << EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: $APP
          namespace: argocd
          finalizers:
            - resources-finalizer.argocd.argoproj.io
          annotations:
            argocd.argoproj.io/sync-wave: "0"
        spec:
          project: default
          source:
            repoURL: https://github.com/ukkiee-dev/homelab.git
            targetRevision: main
            path: manifests/apps/$APP
          destination:
            server: https://kubernetes.default.svc
            namespace: $APP
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
            retry:
              limit: 3
              backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
        EOF

        # YAML 들여쓰기 정규화
        yq eval -i '.' _homelab/argocd/applications/apps/$APP.yaml
        echo "✅ ArgoCD Application 생성 완료"

    # ── ArgoCD Application (monorepo) — 프로젝트 shell 최초 생성 시에만 ──
    # path는 manifests/apps/<app> 루트. 서비스 추가 시 ArgoCD가 루트 kustomization을
    # 따라가 자동 감지하므로 Application은 한 번만 만들면 된다.
    - name: Create ArgoCD Application (monorepo)
      if: ${{ (steps.tunnel.outcome == 'success' || inputs.type == 'worker') && inputs.service-name != '' }}
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
      run: |
        set -euo pipefail
        APP_FILE="_homelab/argocd/applications/apps/$APP.yaml"
        if [ -f "$APP_FILE" ]; then
          echo "⏭️  ArgoCD Application 이미 존재 ($APP), 스킵"
          exit 0
        fi

        cat > "$APP_FILE" << EOF
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: $APP
          namespace: argocd
          finalizers:
            - resources-finalizer.argocd.argoproj.io
          annotations:
            argocd.argoproj.io/sync-wave: "0"
        spec:
          project: default
          source:
            repoURL: https://github.com/ukkiee-dev/homelab.git
            targetRevision: main
            path: manifests/apps/$APP
          destination:
            server: https://kubernetes.default.svc
            namespace: $APP
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=true
            retry:
              limit: 3
              backoff:
                duration: 5s
                factor: 2
                maxDuration: 3m
        EOF

        yq eval -i '.' "$APP_FILE"
        echo "✅ ArgoCD Application 생성 완료 (monorepo shell)"

    # ── Step 3c: CNPG DB 매니페스트 생성 (Phase 7 B) ──────────────
    # database-enabled=true + 모노레포 (service-name 있음) + mode=owner 에서만 실행.
    # flat 앱은 현재 common/ 구조가 없어 database composite 와 충돌 가능 → 후속 확장에서 지원.
    - name: Warn if database-enabled on flat app
      if: inputs.database-enabled == 'true' && inputs.service-name == ''
      shell: bash
      run: |
        echo "::warning::database-enabled=true 는 현재 모노레포 (service-name 있음) 앱만 지원합니다. flat 앱 DB 는 향후 지원 예정. database composite step 을 skip 합니다."

    - name: Setup CNPG database
      if: inputs.database-enabled == 'true' && inputs.service-name != '' && inputs.database-mode == 'owner'
      uses: ukkiee-dev/homelab/.github/actions/setup-app/database@main
      with:
        app-name:             ${{ inputs.app-name }}
        service-name:         ${{ inputs.service-name }}
        mode:                 ${{ inputs.database-mode }}
        db-name:              ${{ inputs.database-name }}
        ref-db:               ${{ inputs.database-ref }}
        role-name:            ${{ inputs.database-role }}
        pg-image-tag:         ${{ inputs.database-pg-image-tag }}
        storage:              ${{ inputs.database-storage }}
        r2-account-id:        ${{ inputs.tf-account-id }}
        r2-access-key-id:     ${{ inputs.r2-access-key-id }}
        r2-secret-access-key: ${{ inputs.r2-secret-access-key }}
        homelab-path:         _homelab

    - name: Update ArgoCD Application for DB common/
      if: inputs.database-enabled == 'true' && inputs.service-name != '' && inputs.database-mode == 'owner'
      shell: bash
      env:
        APP: ${{ inputs.app-name }}
      run: |
        set -euo pipefail
        # database composite 가 manifests/apps/<app>/common/ 을 생성함.
        # 기존 monorepo ArgoCD Application 은 이미 path=manifests/apps/<app> 이고
        # 루트 kustomization 이 common/ 을 참조하도록 composite 가 관리.
        # 추가 작업 없이 root kustomization 에 common/ 추가 확인.
        ROOT_KUST="_homelab/manifests/apps/$APP/kustomization.yaml"
        if [ -f "$ROOT_KUST" ]; then
          if ! yq eval '.resources[]' "$ROOT_KUST" | grep -qx "common"; then
            yq eval -i '.resources = (.resources + ["common"] | unique)' "$ROOT_KUST"
            echo "✅ 루트 kustomization 에 common/ 추가 (DB 매니페스트 참조)"
          else
            echo "⏭️  root kustomization 에 common/ 이미 존재"
          fi
        fi

    # ── Step 4: git commit & push (terraform 완료 후) ─────────────
    - name: Commit & Push
      shell: bash
      env:
        TUNNEL_OUTCOME: ${{ steps.tunnel.outcome }}
        APP_NAME: ${{ inputs.app-name }}
        SUBDOMAIN: ${{ inputs.subdomain }}
        DOMAIN: ${{ inputs.domain }}
        APP_TYPE: ${{ inputs.type }}
      run: |
        set -euo pipefail
        cd _homelab
        git config user.email "deploy-bot@users.noreply.github.com"
        git config user.name "deploy-bot[bot]"

        git add terraform/apps.json

        if [ "$TUNNEL_OUTCOME" = "success" ] || [ "$APP_TYPE" = "worker" ]; then
          git add manifests/ argocd/
        fi

        if git diff --staged --quiet; then
          echo "변경사항 없음, 커밋 스킵"
          exit 0
        fi

        if [ "$APP_TYPE" = "worker" ]; then
          git commit -m "feat: add $APP_NAME (worker)"
        elif [ "$TUNNEL_OUTCOME" = "success" ]; then
          git commit -m "feat: add $APP_NAME ($SUBDOMAIN.$DOMAIN)"
        else
          git commit -m "feat: add DNS for $APP_NAME ($SUBDOMAIN.$DOMAIN) — tunnel 실패, manifests 미생성"
        fi

        PUSHED=false
        for i in 1 2 3; do
          git rebase --abort 2>/dev/null || true
          git pull --rebase origin main && git push && PUSHED=true && break || {
            echo "push 실패 ($i/3), ${i}*5초 후 재시도..."
            sleep $((i * 5))
          }
        done

        if [ "$PUSHED" != "true" ]; then
          echo "3회 retry 후에도 push 실패"
          exit 1
        fi

        echo "homelab 레포 업데이트 완료"
