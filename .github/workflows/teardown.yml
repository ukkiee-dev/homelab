name: Teardown App

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "제거할 앱 이름"
        required: true

jobs:
  teardown:
    uses: ./.github/workflows/_teardown.yml
    with:
      app-name: ${{ inputs.app-name }}
    secrets:
      APP_ID:              ${{ secrets.HOMELAB_APP_ID }}
      APP_PRIVATE_KEY:     ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
      TF_CLOUDFLARE_TOKEN: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
      TF_ZONE_ID:          ${{ secrets.TF_ZONE_ID }}
      TF_TUNNEL_ID:        ${{ secrets.TF_TUNNEL_ID }}
      TF_ACCOUNT_ID:       ${{ secrets.TF_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:    ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      TF_DOMAIN:           ${{ secrets.TF_DOMAIN }}
      ARGOCD_AUTH_TOKEN:   ${{ secrets.ARGOCD_AUTH_TOKEN }}

  notify-success:
    needs: teardown
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          APP_NAME: ${{ inputs.app-name }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="🗑️ 앱 제거 완료: ${APP_NAME}"

  notify-failure:
    needs: teardown
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notification
        env:
          APP_NAME: ${{ inputs.app-name }}
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ Teardown 실패: ${APP_NAME}%0A${RUN_URL}"
