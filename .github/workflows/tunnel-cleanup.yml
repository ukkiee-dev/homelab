name: Tunnel Ingress Cleanup

on:
  workflow_dispatch:
    inputs:
      hostname:
        description: "제거할 hostname (예: test-web.ukkiee.dev)"
        required: true


permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove tunnel ingress
        env:
          CF_TOKEN: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          ACCOUNT_ID: ${{ secrets.TF_ACCOUNT_ID }}
          TUNNEL_ID: ${{ secrets.TF_TUNNEL_ID }}
          TUNNEL_HOSTNAME: ${{ inputs.hostname }}
        run: |
          bash .github/scripts/manage-tunnel-ingress.sh remove "$TUNNEL_HOSTNAME"

      - name: Notify Telegram
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          TUNNEL_HOSTNAME: ${{ inputs.hostname }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="Tunnel ingress 제거 완료: ${TUNNEL_HOSTNAME}"
