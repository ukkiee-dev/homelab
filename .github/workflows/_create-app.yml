name: Create App (Reusable)

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      subdomain:
        required: false
        type: string
        default: ""
      app-type:
        required: true
        type: string
      app-health:
        required: false
        type: string
        default: ""
      default-icon:
        required: false
        type: string
        default: "mdi-application"
      service-name:
        description: "모노레포 서비스 이름. 비면 flat 앱(기존), 채우면 manifests/apps/<app>/services/<service>/ 구조로 생성."
        required: false
        type: string
        default: ""
      database-enabled:
        description: "CNPG DB 생성 여부 (Phase 7). false 면 DB 매니페스트 생성 skip."
        required: false
        type: boolean
        default: false
      database-mode:
        description: "owner | reference | none (default=none)"
        required: false
        type: string
        default: "none"
      database-name:
        description: "Database 이름 (database-mode=owner 필수)"
        required: false
        type: string
        default: ""
      database-role:
        description: "role 이름. 비어있으면 service-name 또는 app-name 기반 기본값"
        required: false
        type: string
        default: ""
      database-ref:
        description: "참조 대상 owner 서비스 이름 (database-mode=reference 전용)"
        required: false
        type: string
        default: ""
      database-storage:
        description: "PVC size (리뷰 M9: default 10Gi, local-path resize 미지원)"
        required: false
        type: string
        default: "10Gi"
      database-pg-image-tag:
        description: "CNPG postgres image tag"
        required: false
        type: string
        default: "16.13-standard-trixie"
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      TF_CLOUDFLARE_TOKEN:
        required: true
      TF_ZONE_ID:
        required: true
      TF_TUNNEL_ID:
        required: true
      TF_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      TF_DOMAIN:
        required: false
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false


jobs:
  create:
    runs-on: ubuntu-latest
    # NOTE: workflow_call reusable 에 top-level 또는 job-level permissions 가 있으면
    # caller 가 startup_failure 로 거부됨 (2026-04-21 GitHub Actions 동작 확인).
    # 권한은 caller workflow 에서 정의해야 한다 (caller 의 permissions 가 reusable 에 상속).

    steps:
      # ── Validate ───────────────────────────────────────────
      - name: Validate app-name format
        env:
          APP_NAME: ${{ inputs.app-name }}
        run: |
          if [[ ! "$APP_NAME" =~ ^[a-z][a-z0-9-]*[a-z0-9]$ ]] || [ ${#APP_NAME} -gt 63 ]; then
            echo "::error::app-name은 RFC 1123 형식이어야 합니다 (소문자, 숫자, 하이픈, 63자 이하)"
            exit 1
          fi

      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Check repo exists in org
        env:
          APP_NAME: ${{ inputs.app-name }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/ukkiee-dev/${APP_NAME}")
          if [ "$STATUS" != "200" ]; then
            echo "::error::ukkiee-dev/${APP_NAME} 레포가 존재하지 않습니다. org에서 템플릿으로 레포를 먼저 생성하세요."
            exit 1
          fi

      - name: Check app does not already exist
        env:
          APP_NAME: ${{ inputs.app-name }}
          SERVICE_NAME: ${{ inputs.service-name }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # service-name 비었을 때: flat 앱. manifests/apps/<app> 디렉토리가 있으면 중복 에러.
          # service-name 채웠을 때: 모노레포 서비스. 프로젝트 디렉토리는 존재해도 OK.
          #   단 manifests/apps/<app>/services/<service> 는 없어야 함.
          if [ -z "$SERVICE_NAME" ]; then
            TARGET="manifests/apps/${APP_NAME}"
            ERR_MSG="${APP_NAME}은 이미 존재하는 앱입니다. teardown 후 다시 실행하세요."
          else
            TARGET="manifests/apps/${APP_NAME}/services/${SERVICE_NAME}"
            ERR_MSG="${APP_NAME}/services/${SERVICE_NAME}은 이미 존재하는 서비스입니다."
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/ukkiee-dev/homelab/contents/${TARGET}")
          if [ "$STATUS" = "200" ]; then
            echo "::error::${ERR_MSG}"
            exit 1
          fi

      # ── GHCR image pre-flight ──────────────────────────────
      # 2026-04-21 test-phase7c incident 대응: 이미지 없이 매니페스트만 배포되면
      # ArgoCD sync 직후 ImagePullBackOff 가 기본값이라 이후 teardown 까지 알람 노이즈
      # + 진단 로그 오염을 발생시킨다. 실패가 아닌 경고로 처리한다 — 정상 흐름은
      # `create-app → 레포 push → build workflow → image 생성` 이므로 이 시점에
      # 이미지 없음이 에러는 아니다. 다만 사용자가 "테스트 스캐폴딩인지" vs "실제 앱 후속 push 예정" 인지
      # 의식할 수 있도록 경고를 남긴다.
      - name: Check GHCR image exists (pre-flight warning)
        env:
          APP_NAME: ${{ inputs.app-name }}
          SERVICE_NAME: ${{ inputs.service-name }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # flat 앱         -> ghcr.io/ukkiee-dev/<app>
          # 모노레포 서비스 -> ghcr.io/ukkiee-dev/<app>-<service>
          if [ -z "$SERVICE_NAME" ]; then
            PKG="$APP_NAME"
          else
            PKG="${APP_NAME}-${SERVICE_NAME}"
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/orgs/ukkiee-dev/packages/container/${PKG}")

          case "$STATUS" in
            200)
              echo "OK  GHCR 이미지 확인: ghcr.io/ukkiee-dev/${PKG}"
              ;;
            404)
              echo "::warning::GHCR 이미지 미존재: ghcr.io/ukkiee-dev/${PKG}:latest"
              echo "  매니페스트는 생성되지만 ArgoCD sync 직후 ImagePullBackOff 상태가 됩니다."
              echo "  - 정식 앱: 이어서 레포에 코드 push -> build workflow 가 이미지 생성 후 자연 해소"
              echo "  - 테스트 스캐폴딩: 즉시 teardown 권장 (알람 노이즈 및 고아 Application 위험)"
              ;;
            *)
              echo "::warning::GHCR API 호출 이상 (HTTP ${STATUS}) -- 이미지 존재 여부 확인 실패, 계속 진행"
              ;;
          esac

      # ── Setup ──────────────────────────────────────────────
      - name: Resolve subdomain
        id: resolve
        env:
          APP_NAME: ${{ inputs.app-name }}
          SERVICE_NAME: ${{ inputs.service-name }}
          SUBDOMAIN: ${{ inputs.subdomain }}
        run: |
          # 기본값:
          #   flat 앱    → <app>
          #   모노레포   → <app>-<service>   (사용자가 subdomain 명시하면 그대로 사용)
          if [ -z "$SUBDOMAIN" ]; then
            if [ -n "$SERVICE_NAME" ]; then
              SUBDOMAIN="${APP_NAME}-${SERVICE_NAME}"
            else
              SUBDOMAIN="$APP_NAME"
            fi
          fi
          echo "subdomain=$SUBDOMAIN" >> "$GITHUB_OUTPUT"

      - name: Fetch description from GitHub repo
        id: desc
        env:
          APP_NAME: ${{ inputs.app-name }}
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DESC=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.github.com/repos/ukkiee-dev/${APP_NAME}" \
            | jq -r '.description // empty')
          if [ -z "$DESC" ]; then
            DESC="$APP_NAME"
          fi
          echo "description=$DESC" >> "$GITHUB_OUTPUT"

      - name: Run setup-app
        uses: ukkiee-dev/homelab/.github/actions/setup-app@main
        with:
          app-name: ${{ inputs.app-name }}
          type: ${{ inputs.app-type }}
          subdomain: ${{ steps.resolve.outputs.subdomain }}
          health: ${{ inputs.app-health }}
          icon: ${{ inputs.default-icon }}
          description: ${{ steps.desc.outputs.description }}
          service-name: ${{ inputs.service-name }}
          app-token: ${{ steps.app-token.outputs.token }}
          tf-cloudflare-token: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          tf-zone-id: ${{ secrets.TF_ZONE_ID }}
          tf-tunnel-id: ${{ secrets.TF_TUNNEL_ID }}
          tf-account-id: ${{ secrets.TF_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          domain: ${{ secrets.TF_DOMAIN }}
          # Phase 7 B: CNPG DB inputs passthrough
          database-enabled: ${{ inputs.database-enabled }}
          database-mode: ${{ inputs.database-mode }}
          database-name: ${{ inputs.database-name }}
          database-role: ${{ inputs.database-role }}
          database-ref: ${{ inputs.database-ref }}
          database-storage: ${{ inputs.database-storage }}
          database-pg-image-tag: ${{ inputs.database-pg-image-tag }}

      # ── Notify ─────────────────────────────────────────────
      - name: Notify success (Telegram)
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP_NAME: ${{ inputs.app-name }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="✅ ${APP_NAME} 생성 완료 — 앱 레포에서 첫 push를 해주세요"

      - name: Notify failure (Telegram)
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP_NAME: ${{ inputs.app-name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then exit 0; fi
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="❌ ${APP_NAME} 생성 실패%0A${RUN_URL}"
