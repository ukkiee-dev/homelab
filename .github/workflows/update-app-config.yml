name: Update App Config

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "앱 이름 (namespace)"
        required: true
      icon:
        description: "Homepage 아이콘 (예: si-astro). 비워두면 변경 안 함"
        required: false
        default: ""
      description:
        description: "Homepage 설명 (예: 개인 블로그). 비워두면 변경 안 함"
        required: false
        default: ""
      health:
        description: "헬스체크 경로 (예: /healthz). 비워두면 변경 안 함"
        required: false
        default: ""

concurrency:
  group: homelab-manifest-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Checkout homelab
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Validate inputs
        env:
          APP: ${{ inputs.app-name }}
          ICON: ${{ inputs.icon }}
          DESC: ${{ inputs.description }}
          HEALTH: ${{ inputs.health }}
        run: |
          set -euo pipefail

          # 최소 1개 입력 검증
          if [ -z "$ICON" ] && [ -z "$DESC" ] && [ -z "$HEALTH" ]; then
            echo "::error::icon, description, health 중 최소 1개를 입력해야 합니다"
            exit 1
          fi

          # app-name 검증 (K8s namespace = RFC 1123 DNS label)
          if [[ ! "$APP" =~ ^[a-z][a-z0-9-]*[a-z0-9]$ ]] || [ ${#APP} -gt 63 ]; then
            echo "::error::app-name은 소문자·숫자·하이픈만 허용, 소문자로 시작/끝, 63자 이하"
            exit 1
          fi

          # 매니페스트 디렉토리 존재 확인
          if [ ! -d "manifests/apps/$APP" ]; then
            echo "::error::manifests/apps/$APP 디렉토리가 존재하지 않습니다"
            exit 1
          fi

          # health 경로 형식 검증
          if [ -n "$HEALTH" ] && [[ ! "$HEALTH" =~ ^/ ]]; then
            echo "::error::health 경로는 /로 시작해야 합니다 (예: /healthz)"
            exit 1
          fi

          # worker 앱 분기: IngressRoute 없으면 icon/description 변경 불가
          if [ -n "$ICON" ] || [ -n "$DESC" ]; then
            if [ ! -f "manifests/apps/$APP/ingressroute.yaml" ]; then
              echo "::error::worker 앱은 IngressRoute가 없어 icon/description 변경이 불가합니다"
              exit 1
            fi
          fi

          echo "✅ 입력값 검증 통과"

      - name: Update manifests
        env:
          APP: ${{ inputs.app-name }}
          ICON: ${{ inputs.icon }}
          DESC: ${{ inputs.description }}
          HEALTH: ${{ inputs.health }}
        run: |
          set -euo pipefail
          CHANGED=false

          # icon 갱신
          if [ -n "$ICON" ]; then
            ICON="$ICON" yq -i '.metadata.annotations["gethomepage.dev/icon"] = strenv(ICON)' \
              manifests/apps/$APP/ingressroute.yaml
            echo "✅ icon → $ICON"
            CHANGED=true
          fi

          # description 갱신
          if [ -n "$DESC" ]; then
            DESC="$DESC" yq -i '.metadata.annotations["gethomepage.dev/description"] = strenv(DESC)' \
              manifests/apps/$APP/ingressroute.yaml
            echo "✅ description → $DESC"
            CHANGED=true
          fi

          # health path 갱신 (3개 probe 모두)
          if [ -n "$HEALTH" ]; then
            for PROBE in startupProbe livenessProbe readinessProbe; do
              HEALTH="$HEALTH" yq -i \
                ".spec.template.spec.containers[0].${PROBE}.httpGet.path = strenv(HEALTH)" \
                manifests/apps/$APP/deployment.yaml
            done
            echo "✅ health → $HEALTH"
            CHANGED=true
          fi

          if [ "$CHANGED" = "false" ]; then
            echo "변경사항 없음"
            exit 0
          fi

          # YAML 구문 검증
          yq eval manifests/apps/$APP/ingressroute.yaml > /dev/null 2>&1 || {
            echo "::error::ingressroute.yaml YAML 구문 오류"
            exit 1
          }
          yq eval manifests/apps/$APP/deployment.yaml > /dev/null 2>&1 || {
            echo "::error::deployment.yaml YAML 구문 오류"
            exit 1
          }

          echo "CHANGED=true" >> "$GITHUB_ENV"

      - name: Commit & Push
        if: env.CHANGED == 'true'
        env:
          APP: ${{ inputs.app-name }}
        run: |
          set -euo pipefail
          git config user.email "deploy-bot@users.noreply.github.com"
          git config user.name "deploy-bot[bot]"

          git add manifests/apps/$APP/

          if git diff --staged --quiet; then
            echo "⏭️  실제 변경 없음, 커밋 스킵"
            exit 0
          fi

          git commit -m "chore: update $APP config (workflow_dispatch)"

          PUSHED=false
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            git pull --rebase origin main && git push && PUSHED=true && break || {
              echo "⚠️  push 실패 ($i/3), 재시도..."
              sleep $((i * 5))
            }
          done

          if [ "$PUSHED" != "true" ]; then
            echo "::error::3회 retry 후에도 push 실패"
            exit 1
          fi

          echo "✅ 매니페스트 갱신 완료 — ArgoCD selfHeal로 자동 반영됩니다"
