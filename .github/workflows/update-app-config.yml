name: Update App Config

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "앱 이름 (namespace)"
        required: true
      service:
        description: "모노레포 서비스 이름 (예: api). 비우면 flat 앱 경로 사용."
        required: false
        default: ""
      icon:
        description: "Homepage 아이콘 (예: si-astro). 비워두면 변경 안 함"
        required: false
        default: ""
      description:
        description: "Homepage 설명 (예: 개인 블로그). 비워두면 변경 안 함"
        required: false
        default: ""
      health:
        description: "헬스체크 경로 (예: /healthz). 비워두면 변경 안 함"
        required: false
        default: ""

concurrency:
  group: homelab-manifest-update
  cancel-in-progress: false


permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Checkout homelab
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Validate inputs
        env:
          APP: ${{ inputs.app-name }}
          SERVICE: ${{ inputs.service }}
          ICON: ${{ inputs.icon }}
          DESC: ${{ inputs.description }}
          HEALTH: ${{ inputs.health }}
        run: |
          set -euo pipefail

          if [ -z "$ICON" ] && [ -z "$DESC" ] && [ -z "$HEALTH" ]; then
            echo "::error::icon, description, health 중 최소 1개를 입력해야 합니다"
            exit 1
          fi

          if [[ ! "$APP" =~ ^[a-z][a-z0-9-]*[a-z0-9]$ ]] || [ ${#APP} -gt 63 ]; then
            echo "::error::app-name은 소문자·숫자·하이픈만 허용, 소문자로 시작/끝, 63자 이하"
            exit 1
          fi

          if [ -n "$SERVICE" ] && [[ ! "$SERVICE" =~ ^[a-z][a-z0-9-]*[a-z0-9]$ ]]; then
            echo "::error::service 이름도 RFC 1123 형식이어야 합니다"
            exit 1
          fi

          # 대상 경로 결정
          if [ -z "$SERVICE" ]; then
            BASE="manifests/apps/$APP"
          else
            BASE="manifests/apps/$APP/services/$SERVICE"
          fi
          echo "BASE=$BASE" >> "$GITHUB_ENV"

          if [ ! -d "$BASE" ]; then
            echo "::error::$BASE 디렉토리가 존재하지 않습니다"
            exit 1
          fi

          if [ -n "$HEALTH" ] && [[ ! "$HEALTH" =~ ^/ ]]; then
            echo "::error::health 경로는 /로 시작해야 합니다 (예: /healthz)"
            exit 1
          fi

          if [ -n "$ICON" ] || [ -n "$DESC" ]; then
            if [ ! -f "$BASE/ingressroute.yaml" ]; then
              echo "::error::IngressRoute가 없어 icon/description 변경이 불가합니다 ($BASE)"
              exit 1
            fi
          fi

          echo "✅ 입력값 검증 통과 (BASE=$BASE)"

      - name: Update manifests
        env:
          APP: ${{ inputs.app-name }}
          SERVICE: ${{ inputs.service }}
          ICON: ${{ inputs.icon }}
          DESC: ${{ inputs.description }}
          HEALTH: ${{ inputs.health }}
        run: |
          set -euo pipefail
          # BASE는 Validate 단계에서 $GITHUB_ENV로 주입됨
          CHANGED=false

          if [ -n "$ICON" ]; then
            ICON="$ICON" yq -i '.metadata.annotations["gethomepage.dev/icon"] = strenv(ICON)' \
              "$BASE/ingressroute.yaml"
            echo "✅ icon → $ICON"
            CHANGED=true
          fi

          if [ -n "$DESC" ]; then
            DESC="$DESC" yq -i '.metadata.annotations["gethomepage.dev/description"] = strenv(DESC)' \
              "$BASE/ingressroute.yaml"
            echo "✅ description → $DESC"
            CHANGED=true
          fi

          if [ -n "$HEALTH" ]; then
            for PROBE in startupProbe livenessProbe readinessProbe; do
              HEALTH="$HEALTH" yq -i \
                ".spec.template.spec.containers[0].${PROBE}.httpGet.path = strenv(HEALTH)" \
                "$BASE/deployment.yaml"
            done
            echo "✅ health → $HEALTH"
            CHANGED=true
          fi

          if [ "$CHANGED" = "false" ]; then
            echo "변경사항 없음"
            exit 0
          fi

          [ -f "$BASE/ingressroute.yaml" ] && yq eval "$BASE/ingressroute.yaml" > /dev/null 2>&1 || true
          [ -f "$BASE/deployment.yaml" ] && yq eval "$BASE/deployment.yaml" > /dev/null 2>&1 || true

          echo "CHANGED=true" >> "$GITHUB_ENV"

      - name: Commit & Push
        if: env.CHANGED == 'true'
        env:
          APP: ${{ inputs.app-name }}
          SERVICE: ${{ inputs.service }}
        run: |
          set -euo pipefail
          git config user.email "deploy-bot@users.noreply.github.com"
          git config user.name "deploy-bot[bot]"

          if [ -z "$SERVICE" ]; then
            git add "manifests/apps/$APP/"
            SCOPE="$APP"
          else
            git add "manifests/apps/$APP/services/$SERVICE/"
            SCOPE="$APP/$SERVICE"
          fi

          if git diff --staged --quiet; then
            echo "⏭️  실제 변경 없음, 커밋 스킵"
            exit 0
          fi

          git commit -m "chore: update $SCOPE config (workflow_dispatch)"

      - name: Push with retry
        uses: ./.github/actions/git-push-retry
