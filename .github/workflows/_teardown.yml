name: Teardown App (Reusable)

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      service:
        description: "모노레포 서비스 이름. 비면 전체 제거(flat 또는 프로젝트 전체), 채우면 해당 서비스만 제거."
        required: false
        type: string
        default: ""
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      TF_CLOUDFLARE_TOKEN:
        required: true
      TF_ZONE_ID:
        required: true
      TF_TUNNEL_ID:
        required: true
      TF_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      TF_DOMAIN:
        required: true


jobs:
  teardown:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Checkout homelab
        uses: actions/checkout@v4
        with:
          repository: ukkiee-dev/homelab
          token: ${{ steps.app-token.outputs.token }}

      # ── Step 1: 모드 감지 + apps.json 제거 + 영향 리소스 수집 ──
      # 3-way 분기:
      #   flat     : manifests/apps/<app>/deployment.yaml (services/ 없음)
      #   service  : input service 채움 → 그 서비스만 제거, shell 유지
      #   project  : service 비움 + manifests/apps/<app>/services/ 존재 → 전체 프로젝트 제거
      - name: Detect mode & remove from apps.json
        id: remove
        env:
          APP_NAME: ${{ inputs.app-name }}
          SERVICE_IN: ${{ inputs.service }}
          TF_DOMAIN: ${{ secrets.TF_DOMAIN }}
        run: |
          set -euo pipefail
          APP="$APP_NAME"
          SERVICE="$SERVICE_IN"
          PROJECT_DIR="manifests/apps/$APP"
          APPS_JSON="terraform/apps.json"

          # 모드 감지 (우선순위 중요)
          if [ -n "$SERVICE" ]; then
            MODE="service"
          elif [ -d "$PROJECT_DIR/services" ]; then
            MODE="project"
          elif [ -f "$PROJECT_DIR/deployment.yaml" ] || [ -f "$PROJECT_DIR/kustomization.yaml" ]; then
            MODE="flat"
          else
            MODE="missing"
            echo "⚠️  manifests/apps/$APP 없음 — 이미 제거된 상태일 수 있음. 그래도 apps.json/tunnel 정리 시도."
          fi
          echo "mode=$MODE"

          # mode별 제거 대상 키 + GHCR 패키지 수집
          KEYS=()
          PKGS=()
          case "$MODE" in
            flat|missing)
              KEYS+=("$APP")
              PKGS+=("$APP")
              ;;
            service)
              KEYS+=("${APP}-${SERVICE}")
              PKGS+=("${APP}-${SERVICE}")
              ;;
            project)
              if [ -d "$PROJECT_DIR/services" ]; then
                for svc_dir in "$PROJECT_DIR/services"/*/; do
                  [ -d "$svc_dir" ] || continue
                  svc=$(basename "$svc_dir")
                  KEYS+=("${APP}-${svc}")
                  PKGS+=("${APP}-${svc}")
                done
              fi
              # legacy <app> 엔트리가 apps.json에 있으면 함께 정리
              KEYS+=("$APP")
              ;;
          esac

          # apps.json에서 해당 키 제거 + hostname 수집
          IN_APPS_JSON=false
          HOSTNAMES_JSON="[]"
          for key in "${KEYS[@]}"; do
            exists=$(jq --arg name "$key" 'has($name)' "$APPS_JSON")
            if [ "$exists" = "true" ]; then
              sub=$(jq -r --arg name "$key" '.[$name].subdomain // empty' "$APPS_JSON")
              if [ -n "$sub" ] && [ -n "$TF_DOMAIN" ]; then
                HOSTNAMES_JSON=$(jq --arg h "${sub}.${TF_DOMAIN}" '. + [$h]' <<< "$HOSTNAMES_JSON")
              fi
              jq --arg name "$key" 'del(.[$name])' "$APPS_JSON" > /tmp/apps.json
              jq empty /tmp/apps.json
              mv /tmp/apps.json "$APPS_JSON"
              IN_APPS_JSON=true
              echo "apps.json: '$key' 제거 (subdomain: $sub)"
            fi
          done

          # ArgoCD Application 삭제 여부: service 모드만 유지
          DELETE_APP=true
          if [ "$MODE" = "service" ]; then
            DELETE_APP=false
          fi

          # Step outputs (다음 step들이 배열을 JSON 문자열로 파싱)
          PKGS_JSON=$(printf '%s\n' "${PKGS[@]}" | jq -R . | jq -sc .)
          HOSTNAMES_OUT=$(jq -c . <<< "$HOSTNAMES_JSON")

          {
            echo "mode=$MODE"
            echo "in_apps_json=$IN_APPS_JSON"
            echo "delete_application=$DELETE_APP"
            echo "hostnames=$HOSTNAMES_OUT"
            echo "ghcr_packages=$PKGS_JSON"
          } >> "$GITHUB_OUTPUT"

          echo "── summary ─────────────────────────"
          echo "  mode             : $MODE"
          echo "  in_apps_json     : $IN_APPS_JSON"
          echo "  delete_application: $DELETE_APP"
          echo "  hostnames        : $HOSTNAMES_OUT"
          echo "  ghcr_packages    : $PKGS_JSON"

      # ── Step 2: Terraform (apps.json에 있던 앱만) ──────────────
      - name: Setup Terraform
        if: steps.remove.outputs.in_apps_json == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        if: steps.remove.outputs.in_apps_json == 'true'
        run: |
          terraform init \
            -backend-config="endpoint=https://${TF_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            -backend-config="access_key=${R2_ACCESS_KEY}" \
            -backend-config="secret_key=${R2_SECRET_KEY}"
        working-directory: terraform
        env:
          TF_ACCOUNT_ID: ${{ secrets.TF_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Terraform Plan
        if: steps.remove.outputs.in_apps_json == 'true'
        run: terraform plan -out=tfplan
        working-directory: terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          TF_VAR_zone_id:              ${{ secrets.TF_ZONE_ID }}
          TF_VAR_tunnel_id:            ${{ secrets.TF_TUNNEL_ID }}
          TF_VAR_account_id:           ${{ secrets.TF_ACCOUNT_ID }}
          TF_VAR_domain:               ${{ secrets.TF_DOMAIN }}

      - name: Terraform Apply
        if: steps.remove.outputs.in_apps_json == 'true'
        run: terraform apply tfplan
        working-directory: terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          TF_VAR_zone_id:              ${{ secrets.TF_ZONE_ID }}
          TF_VAR_tunnel_id:            ${{ secrets.TF_TUNNEL_ID }}
          TF_VAR_account_id:           ${{ secrets.TF_ACCOUNT_ID }}
          TF_VAR_domain:               ${{ secrets.TF_DOMAIN }}

      # ── Step 2.5: Tunnel Ingress 제거 (hostnames 배열 loop) ────
      - name: Remove tunnel ingress
        if: steps.remove.outputs.in_apps_json == 'true'
        continue-on-error: true
        env:
          CF_TOKEN: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          ACCOUNT_ID: ${{ secrets.TF_ACCOUNT_ID }}
          TUNNEL_ID: ${{ secrets.TF_TUNNEL_ID }}
          HOSTNAMES_JSON: ${{ steps.remove.outputs.hostnames }}
        run: |
          set -euo pipefail
          COUNT=$(jq 'length' <<< "$HOSTNAMES_JSON")
          if [ "$COUNT" -eq 0 ]; then
            echo "제거할 hostname 없음"
            exit 0
          fi
          for i in $(seq 0 $((COUNT - 1))); do
            HOSTNAME=$(jq -r ".[$i]" <<< "$HOSTNAMES_JSON")
            [ -z "$HOSTNAME" ] && continue
            echo "tunnel ingress 제거: $HOSTNAME"
            bash .github/scripts/manage-tunnel-ingress.sh remove "$HOSTNAME" || echo "⚠️  '$HOSTNAME' 제거 실패 (계속 진행)"
          done

      # ── Step 2.6: GHCR 패키지 삭제 (다중 패키지 loop) ─────────
      - name: Delete GHCR packages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PKGS_JSON: ${{ steps.remove.outputs.ghcr_packages }}
        run: |
          set -euo pipefail
          COUNT=$(jq 'length' <<< "$PKGS_JSON")
          for i in $(seq 0 $((COUNT - 1))); do
            PKG=$(jq -r ".[$i]" <<< "$PKGS_JSON")
            [ -z "$PKG" ] && continue
            if gh api "orgs/ukkiee-dev/packages/container/${PKG}" -X DELETE 2>/dev/null; then
              echo "✅ GHCR 패키지 삭제: $PKG"
            else
              echo "⏭️  GHCR 패키지 없음 또는 권한 부족 (무시): $PKG"
            fi
          done

      # ── Step 3a: yq 설치 (kustomization 수정용) ────────────────
      - name: Install yq
        uses: mikefarah/yq@v4

      # ── Step 2.9: CNPG DB 있던 앱 감지 (매니페스트 제거 전에 실행) ──
      # common/database-shared.yaml 또는 cluster.yaml 존재 여부로 판단.
      # R2 backup prefix 는 ObjectStore retentionPolicy (7d) 로 자동 만료 안내.
      - name: Notify CNPG backup retention
        id: cnpg
        env:
          APP_NAME: ${{ inputs.app-name }}
          MODE: ${{ steps.remove.outputs.mode }}
        run: |
          set -euo pipefail
          APP="$APP_NAME"
          PROJECT_DIR="manifests/apps/$APP"

          HAD_DB=false
          if [ -f "$PROJECT_DIR/common/database-shared.yaml" ] || [ -f "$PROJECT_DIR/common/cluster.yaml" ]; then
            HAD_DB=true
          fi

          # service 모드는 project 전체가 남으므로 R2 안내 불필요.
          if [ "$HAD_DB" = "true" ] && [ "$MODE" != "service" ]; then
            echo "::notice title=CNPG R2 backup::app=${APP} 의 CNPG Cluster 매니페스트가 제거됩니다."
            echo "::notice::R2 backup prefix 'homelab-db-backups/${APP}-pg/' 는 ObjectStore retentionPolicy (7d) 로 자동 만료."
            echo "::notice::즉시 삭제 필요 시: aws s3 rm s3://homelab-db-backups/${APP}-pg/ --recursive"
            echo "::notice::PITR 복구용 점검은 runbooks/postgresql/cnpg-dr-new-namespace.md 참조."
          fi

          echo "had-database=$HAD_DB" >> "$GITHUB_OUTPUT"

      # ── Step 3: 매니페스트 제거 (mode별 분기) ──────────────────
      - name: Remove manifests & ArgoCD Application
        env:
          APP_NAME: ${{ inputs.app-name }}
          SERVICE: ${{ inputs.service }}
          MODE: ${{ steps.remove.outputs.mode }}
          DELETE_APP: ${{ steps.remove.outputs.delete_application }}
        run: |
          set -euo pipefail
          APP="$APP_NAME"
          PROJECT_DIR="manifests/apps/$APP"

          case "$MODE" in
            flat|project|missing)
              rm -rf "$PROJECT_DIR"
              echo "매니페스트 디렉토리 제거: $PROJECT_DIR"
              ;;
            service)
              SVC_DIR="$PROJECT_DIR/services/$SERVICE"
              if [ -d "$SVC_DIR" ]; then
                rm -rf "$SVC_DIR"
                echo "서비스 디렉토리 제거: $SVC_DIR"
              else
                echo "⚠️  $SVC_DIR 없음 (이미 제거됨?)"
              fi
              # 루트 kustomization.yaml에서 services/<service> 엔트리 제거
              ROOT_KUST="$PROJECT_DIR/kustomization.yaml"
              if [ -f "$ROOT_KUST" ]; then
                SERVICE="$SERVICE" yq eval -i \
                  'del(.resources[] | select(. == "services/" + strenv(SERVICE)))' \
                  "$ROOT_KUST"
                echo "루트 kustomization에서 services/$SERVICE 엔트리 제거"
              fi
              ;;
          esac

          # ArgoCD Application yaml: service 모드에서는 유지
          if [ "$DELETE_APP" = "true" ]; then
            rm -f "argocd/applications/apps/${APP}.yaml"
            echo "ArgoCD Application yaml 제거: $APP"
          else
            echo "ArgoCD Application yaml 유지 (service 모드)"
          fi

      # -- Step 3b: AppProject destinations 제거 (setup-app Step 3d 의 역방향) --
      # flat/project 모드 에서만 실행 (service 모드는 namespace 가 유지됨).
      - name: Remove AppProject destinations
        if: steps.remove.outputs.delete_application == 'true'
        env:
          APP_NAME: ${{ inputs.app-name }}
        run: |
          set -euo pipefail
          for proj_file in \
            manifests/infra/argocd/appproject-apps.yaml \
            manifests/infra/argocd/appproject-infra.yaml; do

            if [ ! -f "$proj_file" ]; then
              echo "WARNING  $proj_file 미존재, 스킵"
              continue
            fi

            EXISTS=$(NS="$APP_NAME" yq '.spec.destinations | map(.namespace == env(NS)) | any' "$proj_file")
            if [ "$EXISTS" = "true" ]; then
              NS="$APP_NAME" yq eval -i '.spec.destinations |= map(select(.namespace != env(NS)))' "$proj_file"
              echo "OK $(basename "$proj_file"): $APP_NAME destination 제거"
            else
              echo "SKIP $(basename "$proj_file"): $APP_NAME destination 없음"
            fi
          done

      - name: Commit & Push
        env:
          APP_NAME: ${{ inputs.app-name }}
          SERVICE: ${{ inputs.service }}
          MODE: ${{ steps.remove.outputs.mode }}
        run: |
          set -euo pipefail
          git config user.email "deploy-bot@users.noreply.github.com"
          git config user.name "deploy-bot[bot]"
          git add manifests/ argocd/ terraform/apps.json

          if git diff --staged --quiet; then
            echo "변경사항 없음"
            exit 0
          fi

          case "$MODE" in
            service) SCOPE="${APP_NAME}/${SERVICE}" ;;
            *)       SCOPE="${APP_NAME}" ;;
          esac
          git commit -m "chore: remove ${SCOPE} (${MODE})"

      - name: Push with retry
        uses: ./.github/actions/git-push-retry

      # ── Step 3.5: GitOps cascade 안내 ─────────────────────────
      # 2026-04-22 refactor: argocd/root.yaml 이 prune: true 로 전환됨 →
      # 이전 step 의 git push 후 root app sync 로 Application CR 자동 제거 + finalizer cascade.
      # 별도 REST API 호출 불필요 (GHA runner → argo.ukkiee.dev curl timeout incident 회피).
      - name: GitOps cascade notice
        if: steps.remove.outputs.delete_application == 'true'
        env:
          APP_NAME: ${{ inputs.app-name }}
        run: |
          echo "::notice::argocd/applications/apps/${APP_NAME}.yaml 제거 커밋 push 완료."
          echo "::notice::root app (prune: true) 이 다음 sync 주기 (보통 1~3 분) 에 Application CR 삭제 → finalizer cascade 로 namespace·Deployment·Cluster 자동 정리."
          echo "::notice::즉시 검증: kubectl -n argocd get app ${APP_NAME}  (NotFound 가 최종 상태)"
