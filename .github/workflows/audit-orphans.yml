name: Audit Orphan Apps & Tunnel Drift

on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월요일 09:00 KST (00:00 UTC)
  workflow_dispatch: # 수동 실행 가능


permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMELAB_APP_ID }}
          private-key: ${{ secrets.HOMELAB_APP_PRIVATE_KEY }}
          owner: ukkiee-dev
          repositories: homelab

      - name: Checkout homelab
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Audit orphan apps
        id: orphans
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # 앱 레포가 없는 것이 정상인 앱 목록 (외부 이미지, infra 앱 등)
          EXCLUDE_LIST: "postgresql,argocd"
        run: |
          set -euo pipefail

          ORPHANS=""
          for APP in $(jq -r 'keys[]' terraform/apps.json); do
            # 제외 목록 확인
            if echo ",$EXCLUDE_LIST," | grep -q ",$APP,"; then
              echo "제외: $APP (외부 이미지 앱)"
              continue
            fi

            # 레포 존재 확인
            if ! gh repo view "ukkiee-dev/$APP" --json name > /dev/null 2>&1; then
              ORPHANS="${ORPHANS}${APP}\n"
              echo "고아 앱 발견: $APP"
            else
              echo "정상: $APP"
            fi
          done

          if [ -n "$ORPHANS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            # 개행을 comma로 변환하여 output에 저장
            echo "list=$(echo -e "$ORPHANS" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "고아 앱 없음"
          fi

      - name: Audit tunnel drift
        id: drift
        env:
          CF_TOKEN: ${{ secrets.TF_CLOUDFLARE_TOKEN }}
          ACCOUNT_ID: ${{ secrets.TF_ACCOUNT_ID }}
          TUNNEL_ID: ${{ secrets.TF_TUNNEL_ID }}
          DOMAIN: ${{ secrets.TF_DOMAIN }}
        run: |
          set -euo pipefail

          # apps.json + infra-hostnames.json에서 expected hostnames 추출
          # infra-hostnames.json: ArgoCD 등 앱 레포가 없는 infra 도메인 레지스트리
          EXPECTED=$( {
            jq -r 'to_entries[] | "\(.value.subdomain).'"${DOMAIN}"'"' terraform/apps.json
            jq -r 'to_entries[] | "\(.value.subdomain).'"${DOMAIN}"'"' terraform/infra-hostnames.json
          } | sort -u)

          # Tunnel API에서 현재 hostnames 추출
          ACTUAL=$(bash .github/scripts/manage-tunnel-ingress.sh list | sort)

          # DNS에만 있고 Tunnel에 없는 것
          DNS_ONLY=$(comm -23 <(echo "$EXPECTED") <(echo "$ACTUAL") || true)

          # Tunnel에만 있고 DNS에 없는 것
          TUNNEL_ONLY=$(comm -13 <(echo "$EXPECTED") <(echo "$ACTUAL") || true)

          if [ -n "$DNS_ONLY" ] || [ -n "$TUNNEL_ONLY" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "dns_only=$(echo "$DNS_ONLY" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
            echo "tunnel_only=$(echo "$TUNNEL_ONLY" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
            echo "Tunnel drift 발견"
            [ -n "$DNS_ONLY" ] && echo "DNS에만: $DNS_ONLY"
            [ -n "$TUNNEL_ONLY" ] && echo "Tunnel에만: $TUNNEL_ONLY"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Tunnel drift 없음"
          fi

      - name: Notify Telegram
        if: steps.orphans.outputs.found == 'true' || steps.drift.outputs.found == 'true'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          ORPHAN_FOUND: ${{ steps.orphans.outputs.found }}
          ORPHAN_LIST: ${{ steps.orphans.outputs.list }}
          DRIFT_FOUND: ${{ steps.drift.outputs.found }}
          DNS_ONLY: ${{ steps.drift.outputs.dns_only }}
          TUNNEL_ONLY: ${{ steps.drift.outputs.tunnel_only }}
        run: |
          # C-style $'...' 로 실제 \n 문자열 구성 → curl --data-urlencode 가 안전하게 인코딩.
          # 기존 %0A 리터럴 + -d 방식은 MSG 내 &/=/+ 같은 문자에 취약해 잘림 유발 가능.
          MSG=$'주간 감사 결과\n'

          if [ "$ORPHAN_FOUND" = "true" ]; then
            MSG+=$'\n고아 앱: '"${ORPHAN_LIST}"$'\n정리: gh workflow run teardown.yml -f app-name=<이름>'
          fi

          if [ "$DRIFT_FOUND" = "true" ]; then
            MSG+=$'\n\nTunnel drift:'
            [ -n "$DNS_ONLY" ]    && MSG+=$'\nDNS에만: '"${DNS_ONLY}"
            [ -n "$TUNNEL_ONLY" ] && MSG+=$'\nTunnel에만: '"${TUNNEL_ONLY}"
            MSG+=$'\n조치: terraform/apps.json 또는 terraform/infra-hostnames.json 누락 여부 먼저 확인'
          fi

          curl -sS --fail -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}"

      - name: Notify workflow failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="주간 감사 워크플로우 실패%0A실행 로그: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d text="$MSG"
