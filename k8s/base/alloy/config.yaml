apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
data:
  config.alloy: |
    // Log collection from K8s pods
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.victorialogs.receiver]
    }

    loki.write "victorialogs" {
      endpoint {
        url = "http://victoria-logs.monitoring:9428/insert/loki/api/v1/push"
      }
    }

    // Metrics: remote write to VictoriaMetrics
    prometheus.remote_write "victoriametrics" {
      endpoint {
        url = "http://victoria-metrics.monitoring:8428/api/v1/write"
      }
    }
