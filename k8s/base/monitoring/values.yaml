# kube-prometheus-stack Helm values
# K3s + OrbStack 호환 설정

# --- K3s 호환: 존재하지 않는 컴포넌트 비활성화 ---
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false

# --- Prometheus ---
prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1536Mi
    # Immich namespace도 scrape
    podMonitorNamespaceSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

# --- Grafana ---
grafana:
  adminPassword: ""  # Secret으로 관리
  admin:
    existingSecret: infisical-managed-monitoring
    userKey: GRAFANA_ADMIN_USERNAME
    passwordKey: GRAFANA_ADMIN_PASSWORD
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Loki 데이터소스 자동 추가
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring:3100
      isDefault: false

# --- AlertManager ---
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: telegram
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            alertname: Watchdog
          receiver: "null"
        - match:
            alertname: InfoInhibitor
          receiver: "null"
        - match:
            severity: critical
          receiver: telegram
          repeat_interval: 1h
    receivers:
      - name: "null"
      - name: telegram
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/telegram-bot-token/telegram-bot-token
            chat_id: 8001733025
            parse_mode: HTML
            send_resolved: true
            message: |
              {{ range .Alerts }}
              {{ if eq .Status "firing" }}🔥 <b>[발생]</b>{{ else }}✅ <b>[해소]</b>{{ end }} <b>{{ .Labels.alertname }}</b>
              {{ if .Annotations.summary }}📋 {{ .Annotations.summary }}{{ end }}
              {{ if .Annotations.description }}💬 {{ .Annotations.description }}{{ end }}
              🏷 심각도: {{ .Labels.severity }}
              📦 네임스페이스: {{ .Labels.namespace }}
              🕐 {{ if eq .Status "firing" }}발생: {{ .StartsAt.Local.Format "2006-01-02 15:04:05" }}{{ else }}해소: {{ .EndsAt.Local.Format "2006-01-02 15:04:05" }}{{ end }}
              {{ end }}
  alertmanagerSpec:
    secrets:
      - telegram-bot-token
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# --- 기본 알림 규칙 ---
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false          # K3s에는 etcd가 없음
    kubeScheduler: false
    kubeProxy: false
    kubeControllerManager: false

# --- 추가 알림 규칙 (Immich) ---
additionalPrometheusRulesMap:
  immich-rules:
    groups:
      - name: immich
        rules:
          - alert: ImmichStorageHigh
            expr: |
              kubelet_volume_stats_used_bytes{persistentvolumeclaim="immich-media", namespace="immich"}
              /
              kubelet_volume_stats_capacity_bytes{persistentvolumeclaim="immich-media", namespace="immich"}
              > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Immich 미디어 스토리지 85% 초과"
          - alert: ImmichCrashLoop
            expr: |
              increase(kube_pod_container_status_restarts_total{
                namespace="immich", container="server"
              }[10m]) > 3
            labels:
              severity: critical
            annotations:
              summary: "Immich 서버 반복 재시작 — SSD 분리 가능성"
  k3s-system-rules:
    groups:
      - name: k3s-system
        rules:
          - alert: K3sKubeletMemoryHigh
            expr: process_resident_memory_bytes{job="kubelet"} / 1024 / 1024 > 800
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "kubelet 메모리 {{ $value | printf \"%.0f\" }}Mi — K8s가 인지 못하는 시스템 메모리"
              description: "kubelet RSS가 800Mi 초과. K8s 리소스 관리 밖이므로 노드 메모리 압박 유발."
          - alert: K3sApiserverMemoryHigh
            expr: process_resident_memory_bytes{job="apiserver"} / 1024 / 1024 > 800
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "apiserver 메모리 {{ $value | printf \"%.0f\" }}Mi — K8s가 인지 못하는 시스템 메모리"
              description: "kube-apiserver RSS가 800Mi 초과. 잦은 API 호출(ArgoCD sync 등)이 원인일 수 있음."
          - alert: K3sSystemMemoryOverhead
            expr: |
              (process_resident_memory_bytes{job="kubelet"} + on() process_resident_memory_bytes{job="apiserver"})
              / 1024 / 1024 > 1500
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "K3s 시스템 프로세스 합산 {{ $value | printf \"%.0f\" }}Mi — 노드 swap 압박 경고"
              description: "kubelet + apiserver 합산 1.5Gi 초과. Pod 메모리와 별개로 노드 물리 메모리를 소모."
          - alert: NodeSwapUsageHigh
            expr: node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes > 1073741824
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Swap 사용 {{ $value | humanize }} — 물리 메모리 부족"
              description: "Swap 1Gi 초과 사용 중. major page fault 원인."
