# Tailscale Operator Helm Values
# helm repo add tailscale https://pkgs.tailscale.com/helmcharts
# helm install tailscale-operator tailscale/tailscale-operator \
#   -n tailscale-system -f values.yaml
#
# Prerequisites: Create OAuth client in Tailscale Admin
#   - Tags: tag:k8s
#   - Scopes: devices (write), auth keys (write)
#   Docs: https://tailscale.com/kb/1236/kubernetes-operator

oauth:
  clientId: ""      # Tailscale OAuth Client ID
  clientSecret: ""  # Tailscale OAuth Client Secret

operatorConfig:
  hostname: homelab-operator
