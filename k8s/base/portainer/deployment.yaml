apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: apps
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/component: management
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: portainer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portainer
        app.kubernetes.io/component: management
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
    spec:
      serviceAccountName: portainer
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portainer
          image: portainer/portainer-ce:2.39.0
          args: ["--admin-password", "$(ADMIN_PASSWORD_HASH)"]
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: TZ
              value: Asia/Seoul
            - name: ADMIN_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: portainer
                  key: kv-admin-password-hash
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: portainer-data
