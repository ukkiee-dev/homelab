apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portainer-data
  namespace: apps
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/component: management
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
