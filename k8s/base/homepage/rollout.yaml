apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: homepage
  namespace: apps
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  strategy:
    blueGreen:
      activeService: homepage
      previewService: homepage-preview
      autoPromotionEnabled: true
      autoPromotionSeconds: 30
      scaleDownDelaySeconds: 30
      scaleDownDelayRevisionLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
    spec:
      serviceAccountName: homepage
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:v1.11.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: TZ
              value: Asia/Seoul
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.ukkiee.dev,preview-home.ukkiee.dev
            - name: HOMEPAGE_VAR_ADGUARD_USER
              valueFrom:
                secretKeyRef:
                  name: infisical-managed-apps
                  key: ADGUARD_USERNAME
            - name: HOMEPAGE_VAR_ADGUARD_PASS
              valueFrom:
                secretKeyRef:
                  name: infisical-managed-apps
                  key: ADGUARD_PASSWORD
            - name: HOMEPAGE_VAR_IMMICH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: infisical-managed-apps
                  key: IMMICH_API_KEY
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/config/logs
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: homepage-config
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
