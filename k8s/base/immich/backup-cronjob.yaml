apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-backup
  labels:
    app.kubernetes.io/name: immich-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  schedule: "0 18 * * *"  # 03:00 KST (UTC 18:00)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          initContainers:
            # Step 1: pg_dump (완료 후에만 restic 실행)
            - name: pgdump
              image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
              command:
                - sh
                - -c
                - |
                  echo "=== pg_dump started at $(date) ==="
                  pg_dump -Fc -h immich-postgres -U postgres -d immich -f /backups/pgdump/immich-$(date +%Y%m%d).sql
                  # 7일 이전 덤프 삭제
                  find /backups/pgdump -name "immich-*.sql" -mtime +7 -delete
                  echo "=== pg_dump completed ==="
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: infisical-managed-immich
                      key: IMMICH_DB_PASSWORD
              volumeMounts:
                - name: backups
                  mountPath: /backups
          containers:
            # Step 2: Restic backup (로컬 + R2)
            - name: restic
              image: restic/restic:0.17.3
              command:
                - sh
                - -c
                - |
                  echo "=== Restic backup started at $(date) ==="

                  # 로컬 repo 백업
                  echo "--- Local repo backup ---"
                  restic -r /backups/restic backup \
                    /media/library \
                    /backups/pgdump \
                    --exclude="thumbs" \
                    --exclude="encoded-video" \
                    --exclude="upload" \
                    --exclude="profile" \
                    --tag immich

                  # 로컬 repo 보존 정책
                  restic -r /backups/restic forget \
                    --keep-daily 7 --keep-weekly 4 --keep-monthly 6 \
                    --prune

                  # R2 repo 백업
                  echo "--- R2 repo backup ---"
                  restic -r s3:${R2_ENDPOINT}/${R2_BUCKET} backup \
                    /media/library \
                    /backups/pgdump \
                    --exclude="thumbs" \
                    --exclude="encoded-video" \
                    --exclude="upload" \
                    --exclude="profile" \
                    --tag immich

                  # R2 repo 보존 정책
                  restic -r s3:${R2_ENDPOINT}/${R2_BUCKET} forget \
                    --keep-daily 7 --keep-weekly 4 --keep-monthly 6 \
                    --prune

                  echo "=== Restic backup completed at $(date) ==="
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: infisical-managed-immich
                      key: R2_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: infisical-managed-immich
                      key: R2_SECRET_ACCESS_KEY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: infisical-managed-immich
                      key: RESTIC_PASSWORD
                - name: R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: infisical-managed-immich
                      key: R2_ENDPOINT
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: infisical-managed-immich
                      key: R2_BUCKET
              volumeMounts:
                - name: media
                  mountPath: /media
                  readOnly: true
                - name: backups
                  mountPath: /backups
          volumes:
            - name: media
              persistentVolumeClaim:
                claimName: immich-media
            - name: backups
              persistentVolumeClaim:
                claimName: immich-backup
