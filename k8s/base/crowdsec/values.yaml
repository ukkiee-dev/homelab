# CrowdSec — Agent + LAPI

container_runtime: containerd

lapi:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistentVolume:
    data:
      enabled: true
      size: 1Gi
  env:
    # 커뮤니티 blocklist 구독
    - name: ENROLL_INSTANCE_NAME
      value: homelab
    # Bouncer API key는 설치 후 생성

agent:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  acquisition:
    # Traefik 액세스 로그 수집
    - namespace: traefik-system
      podName: traefik-*
      program: traefik
  env:
    - name: COLLECTIONS
      value: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/base-http-scenarios"
