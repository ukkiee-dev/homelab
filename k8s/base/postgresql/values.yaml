# Bitnami PostgreSQL — API 서버 전용
# Immich PostgreSQL과 별도 인스턴스 (Immich는 벡터 확장 전용 이미지 사용)

auth:
  database: api
  username: api
  existingSecret: postgresql-auth

primary:
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
