apiVersion: v1
kind: Service
metadata:
  name: adguard
  namespace: apps
  labels:
    app.kubernetes.io/name: adguard
    app.kubernetes.io/component: dns
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    app.kubernetes.io/name: adguard
  ports:
    - name: http
      port: 3000
      targetPort: http
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
