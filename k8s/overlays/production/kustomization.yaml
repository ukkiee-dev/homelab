apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: homelab
      app.kubernetes.io/managed-by: argocd

resources:
  # Namespaces
  - ../../base/namespaces

  # Core infrastructure
  - ../../base/traefik
  - ../../base/cloudflared
  - ../../base/tailscale-operator

  # Applications
  - ../../base/homepage
  - ../../base/uptime-kuma
  - ../../base/adguard
  - ../../base/portainer
  - ../../base/dozzle
  - ../../base/immich
  - ../../base/api-server

  # CI/CD
  - ../../base/arc-runners
  - ../../base/argocd
  - ../../base/argo-rollouts

  # Network Policies
  - ../../base/network-policies
