apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web
  namespace: test-phase7c
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: test-phase7c
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Apps"
    gethomepage.dev/name: "test-phase7c/web"
    gethomepage.dev/icon: "mdi-application"
    gethomepage.dev/href: "https://test-phase7c-web.ukkiee.dev"
    gethomepage.dev/description: "Phase 7C end-to-end 테스트 (일회성, 테스트 후 삭제 예정)"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=web"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`test-phase7c-web.ukkiee.dev`)
      kind: Rule
      middlewares:
        - name: security-headers
          namespace: traefik-system
        - name: gzip
          namespace: traefik-system
      services:
        - name: web
          port: 3000
