        apiVersion: traefik.io/v1alpha1
        kind: IngressRoute
        metadata:
          name: test-app
          namespace: test-app
          labels:
            app.kubernetes.io/name: test-app
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: "Apps"
            gethomepage.dev/name: "test-app"
            gethomepage.dev/icon: "mdi-test-tube"
            gethomepage.dev/href: "https://test-app.ukkiee.dev"
            gethomepage.dev/description: "Homepage 자동 등록 테스트"
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=test-app"
        spec:
          entryPoints:
            - web
            - websecure
          routes:
            - match: Host(`test-app.ukkiee.dev`)
              kind: Rule
              middlewares:
                - name: security-headers
                  namespace: traefik-system
                - name: gzip
                  namespace: traefik-system
              services:
                - name: test-app
                  port: 3000
