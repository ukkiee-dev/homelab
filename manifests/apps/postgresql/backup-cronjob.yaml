apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
  namespace: apps
  labels:
    app.kubernetes.io/name: postgresql-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  schedule: "0 18 * * *"  # 03:00 KST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgresql-backup
            app.kubernetes.io/component: backup
            app.kubernetes.io/part-of: homelab
            app.kubernetes.io/managed-by: argocd
        spec:
          priorityClassName: batch-low
          restartPolicy: Never
          securityContext:
            runAsNonRoot: false
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pgdump
              image: postgres:18-alpine
              command:
                - /bin/sh
                - -c
                - |
                  #!/bin/sh
                  set -e
                  echo "=== postgresql-backup started at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

                  # 1. Tools — postgres:18-alpine에 psql/pg_dump v18 내장,
                  #    rclone은 공식 binary 다운로드 (apk에 없거나 구버전)
                  apk add --no-cache curl unzip ca-certificates >/dev/null
                  RCLONE_VERSION=1.69.0
                  ARCH=$(uname -m)
                  case "$ARCH" in
                    aarch64|arm64) RC_ARCH=arm64 ;;
                    x86_64|amd64)  RC_ARCH=amd64 ;;
                    *) echo "unsupported arch: $ARCH"; exit 1 ;;
                  esac
                  curl -fsSL "https://downloads.rclone.org/v${RCLONE_VERSION}/rclone-v${RCLONE_VERSION}-linux-${RC_ARCH}.zip" -o /tmp/rclone.zip
                  unzip -q /tmp/rclone.zip -d /tmp/
                  install -m 755 "/tmp/rclone-v${RCLONE_VERSION}-linux-${RC_ARCH}/rclone" /usr/local/bin/rclone
                  rm -rf /tmp/rclone.zip "/tmp/rclone-v${RCLONE_VERSION}-linux-${RC_ARCH}"

                  # 2. DB 리스트 동적 조회 (시스템 DB 제외)
                  DBS=$(PGPASSWORD="$PG_PASSWORD" psql -h postgresql -U postgres -tAc \
                    "SELECT datname FROM pg_database WHERE datistemplate=false AND datname!='postgres';")
                  echo "Discovered databases: $DBS"

                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  TMP=/tmp/dumps
                  mkdir -p "$TMP"

                  # 3. 각 DB를 pg_dump -Fc (custom format, 압축됨)
                  for DB in $DBS; do
                    echo "Dumping $DB ..."
                    PGPASSWORD="$PG_PASSWORD" pg_dump -h postgresql -U postgres -Fc -d "$DB" \
                      > "$TMP/${DB}-${TS}.dump"
                    echo "  -> $(wc -c <"$TMP/${DB}-${TS}.dump") bytes"
                  done

                  # 4. 글로벌 오브젝트(role, grant) 별도
                  PGPASSWORD="$PG_PASSWORD" pg_dumpall -h postgresql -U postgres --globals-only \
                    > "$TMP/globals-${TS}.sql"
                  echo "Globals dumped: $(wc -c <"$TMP/globals-${TS}.sql") bytes"

                  # 5. 외장 SSD 로컬 저장 (3일 보존) — find로 POSIX 안전하게
                  #    (DB 없는 초기 상태에서 *.dump 미존재 시 globbing 실패 방지)
                  find "$TMP" -maxdepth 1 -type f \( -name "*.dump" -o -name "*.sql" \) \
                    -exec cp {} /backups/ \;
                  find /backups -type f \( -name "*.dump" -o -name "*.sql" \) -mtime +3 -delete

                  # 6. rclone 설정 (env 주입, 파일 없이도 가능하지만 config 파일이 안정적)
                  mkdir -p /root/.config/rclone
                  cat > /root/.config/rclone/rclone.conf <<EOF
                  [r2]
                  type = s3
                  provider = Cloudflare
                  access_key_id = $R2_ACCESS_KEY_ID
                  secret_access_key = $R2_SECRET_ACCESS_KEY
                  endpoint = $R2_ENDPOINT
                  region = auto
                  EOF

                  BUCKET=homelab-postgresql-backup

                  # 7. R2 3계층 업로드 (daily는 항상, weekly는 일요일, monthly는 1일)
                  echo "Uploading to r2:$BUCKET/daily/ ..."
                  rclone copy "$TMP/" "r2:$BUCKET/daily/" --s3-no-check-bucket

                  if [ "$(date -u +%u)" = "7" ]; then
                    echo "Sunday -- also uploading to weekly/"
                    rclone copy "$TMP/" "r2:$BUCKET/weekly/" --s3-no-check-bucket
                  fi

                  if [ "$(date -u +%d)" = "01" ]; then
                    echo "1st of month -- also uploading to monthly/"
                    rclone copy "$TMP/" "r2:$BUCKET/monthly/" --s3-no-check-bucket
                  fi

                  # 8. 정리
                  rm -rf "$TMP"
                  echo "=== postgresql-backup complete at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
                  ls -lh /backups/
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              env:
                - name: PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-auth
                      key: postgres-password
                - name: R2_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-backup-r2
                      key: access_key_id
                - name: R2_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-backup-r2
                      key: secret_access_key
                - name: R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-backup-r2
                      key: endpoint
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgresql-backups-ssd
