# PostgreSQL Helm Values (custom overrides only)
# Chart: bitnami/postgresql
# Full chart defaults: https://github.com/bitnami/charts/tree/main/bitnami/postgresql

auth:
  database: api
  username: api
  existingSecret: postgresql-auth

primary:
  resources:
    requests:
      cpu: 50m
      memory: 48Mi
    limits:
      cpu: 300m
      memory: 96Mi
  persistence:
    enabled: true
    size: 5Gi

metrics:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 24Mi
    limits:
      cpu: 100m
      memory: 64Mi
  service:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
