apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper
  namespace: pokopia-wiki
  labels:
    app.kubernetes.io/name: scraper
    app.kubernetes.io/part-of: pokopia-wiki
    app.kubernetes.io/component: worker
    app.kubernetes.io/version: latest
    app.kubernetes.io/managed-by: argocd
spec:
  revisionHistoryLimit: 3
  # scraper 는 CLI 도구라 인자 없이 실행되면 process.exit(1) → CrashLoop.
  # 운영 패턴 결정 전까지 (CronJob 변환 / node-cron daemon / 수동 dispatch)
  # replicas=0 으로 두어 alarm 노이즈 차단. _update-image.yml 이 향후 1 로 다시
  # bump 할 수 있으니 본 PR 은 일시적 — 영구 fix 는 별도 PR 권장.
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: scraper
      app.kubernetes.io/part-of: pokopia-wiki
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scraper
        app.kubernetes.io/part-of: pokopia-wiki
        app.kubernetes.io/version: latest
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: scraper
          image: ghcr.io/ukkiee-dev/pokopia-wiki-scraper:7bd750d5241113428af956b1b6fa2421aef39c50
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: PGHOST
              value: pokopia-wiki-pg-rw.pokopia-wiki.svc
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: pokopia_wiki
            - name: PGUSER
              value: api
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pokopia-wiki-pg-api-credentials
                  key: password
