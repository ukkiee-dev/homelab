apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pokopia-wiki

resources:
  - namespace.yaml
  - role-secrets.sealed.yaml
  - r2-backup.sealed.yaml
  - cluster.yaml
  - objectstore.yaml
  - scheduled-backup.yaml
  - database-shared.yaml       # 시나리오-1 (공유 DB: wiki service 하나, 향후 추가 시 reference 모드)
  - network-policy.yaml        # 리뷰 M11 (현재 K3s NP enforcement 없음, 문서화용)
  # 리뷰 P6: ResourceQuota 는 scheduling app 이 관리 (manifests/infra/scheduling/resourcequota-pokopia-wiki.yaml)
