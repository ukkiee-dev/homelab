apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: wiki
  namespace: pokopia-wiki
  annotations:
    # Cluster (wave 0) + managed.roles reconcile 후 Database 생성
    argocd.argoproj.io/sync-wave: "1"
spec:
  cluster:
    name: pokopia-wiki-pg
  name: wiki
  owner: wiki
  # v0.4 I-2a: ArgoCD prune 방어, 기본값 명시적 박제.
  databaseReclaimPolicy: retain
