apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  # K8s metadata.name 은 RFC 1123 (소문자 영숫자 + - + .). underscore 금지.
  # spec.name (실제 PG database 이름) 은 PG 표준 underscore 유지.
  name: pokopia-wiki-db
  namespace: pokopia-wiki
  annotations:
    # Cluster (wave 0) + managed.roles reconcile 후 Database
    argocd.argoproj.io/sync-wave: "1"
spec:
  cluster:
    name: pokopia-wiki-pg
  name: pokopia_wiki
  owner: api
  # v0.4 I-2a: ArgoCD prune 방어, 기본값 명시적 박제
  databaseReclaimPolicy: retain
