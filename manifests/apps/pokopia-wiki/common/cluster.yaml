apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pokopia-wiki-pg
  namespace: pokopia-wiki
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: pokopia-wiki-pg
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: pokopia-wiki
    app.kubernetes.io/managed-by: argocd
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.13-standard-trixie
  primaryUpdateStrategy: unsupervised

  storage:
    # 리뷰 M9: setup-app default 10Gi (local-path resize 미지원)
    size: 10Gi
    storageClass: local-path

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  monitoring:
    enablePodMonitor: false

  # inheritedMetadata: Pod 에 prometheus.io/* annotation 자동 전파 → VM kubernetes-pods job auto-discovery
  inheritedMetadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
      prometheus.io/path: "/metrics"

  # Postgres GUC (design §D15 M3). limits 512Mi 기준 PoC 수준 튜닝.
  postgresql:
    parameters:
      shared_buffers: "128MB"
      work_mem: "4MB"
      max_connections: "50"
      maintenance_work_mem: "32MB"
      effective_cache_size: "256MB"
      wal_buffers: "8MB"
      log_min_duration_statement: "250ms"
      log_checkpoints: "on"

  managed:
    roles:
      - name: wiki
        ensure: present
        login: true
        passwordSecret:
          name: pokopia-wiki-pg-wiki-credentials

  # Phase 4 확정 패턴: plugins 블록 포함 → WAL archive 활성.
  # pokopia-wiki 는 신규 Cluster 이므로 archive 충돌 없음 (empty destination).
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: pokopia-wiki-backup
        serverName: pokopia-wiki-pg
