apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: apps
  labels:
    app.kubernetes.io/name: homepage
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    layout:
      Services:
        style: row
        columns: 4
      Apps:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 5
      Monitoring:
        style: row
        columns: 3

  widgets.yaml: |
    - resources:
        cpu: true
        memory: true
        disk: /
    - datetime:
        text_size: xl
        format:
          hour12: false

  services.yaml: |
    - Services:
        - Immich:
            icon: immich.png
            href: https://photos.ukkiee.dev
            description: Photo & Video Backup
            widget:
              type: immich
              url: http://immich-server.immich:2283
              key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
              version: 2
        - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://status.ukkiee.dev
            description: Service Monitoring
            widget:
              type: uptimekuma
              url: http://uptime-kuma.apps.svc.cluster.local:3001
              slug: default
        - AdGuard Home:
            icon: adguard-home.png
            href: https://adguard.ukkiee.dev
            description: DNS Ad Blocker
            widget:
              type: adguard
              url: http://adguard.apps.svc.cluster.local:3000
              username: "{{HOMEPAGE_VAR_ADGUARD_USER}}"
              password: "{{HOMEPAGE_VAR_ADGUARD_PASS}}"
    - Infrastructure:
        - Traefik:
            icon: traefik.png
            href: https://traefik.ukkiee.dev
            description: Reverse Proxy
        - ArgoCD:
            icon: sh-argo-cd.png
            href: https://argo.ukkiee.dev
            description: GitOps
        - Sealed Secrets:
            icon: mdi-shield-lock
            description: Secret Management
        - Cloudflare Tunnel:
            icon: cloudflare.png
            description: External Access
    - Monitoring:
        - Grafana:
            icon: grafana.png
            href: https://grafana.ukkiee.dev
            description: Metrics & Logs
        - VictoriaMetrics:
            icon: mdi-chart-line
            description: Metrics Collection
        - VictoriaLogs:
            icon: mdi-text-box-outline
            description: Log Collection

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.png
              href: https://github.com/ukkiee-dev
        - Cloudflare:
            - icon: cloudflare.png
              href: https://dash.cloudflare.com
        - Tailscale:
            - icon: tailscale.png
              href: https://login.tailscale.com/admin

  docker.yaml: ""
  proxmox.yaml: ""
  custom.css: ""
  custom.js: ""
