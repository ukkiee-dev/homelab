apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: pg-trial-backup
  namespace: pg-trial
spec:
  configuration:
    destinationPath: s3://homelab-db-backups/pg-trial
    # Phase 0 Task 0.5 에서 확정된 Cloudflare Account ID (public endpoint)
    endpointURL: https://142c501381145f1d42bd2b8107be8a0e.r2.cloudflarestorage.com
    s3Credentials:
      accessKeyId:
        name: r2-pg-backup
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: r2-pg-backup
        key: SECRET_ACCESS_KEY
    wal:
      compression: gzip
    data:
      compression: gzip
  # Barman 자체 retention (R2 lifecycle 대신). 14일 초과 base + 연결 WAL 자동 정리.
  retentionPolicy: "14d"
