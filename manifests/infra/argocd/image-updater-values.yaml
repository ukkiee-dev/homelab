config:
  registries:
    - name: GHCR
      api_url: https://ghcr.io
      prefix: ghcr.io
      credentials: pullsecret:argocd/ghcr-pull-secret
      default: true

# 이미지 체크 주기: 기본 2분 → 10분 (API 부하 및 메모리 진동 감소)
extraArgs:
  - --interval=10m
  - --leader-election=false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
