apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  description: Infrastructure components (sealed-secrets, traefik, tailscale-operator)
  sourceRepos:
    - "https://github.com/ukkiee-dev/homelab.git"
    - "https://bitnami-labs.github.io/sealed-secrets"
    - "https://traefik.github.io/charts"
    - "https://pkgs.tailscale.com/helmcharts"
    - "ghcr.io/actions/actions-runner-controller-charts"
  destinations:
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: traefik-system
      server: https://kubernetes.default.svc
    - namespace: tailscale-system
      server: https://kubernetes.default.svc
    - namespace: networking
      server: https://kubernetes.default.svc
    - namespace: actions-runner-system
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    # scheduling application 이 전역 ResourceQuota/LimitRange 를 각 워크로드
    # 네임스페이스에 배포하기 위해 destinations 확장. apps/monitoring/test-web
    # 네임스페이스의 정책만 `infra` project 가 소유한다 — 실제 앱 배포는
    # 각각 apps/monitoring project 에서 수행된다.
    - namespace: apps
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: test-web
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: ServiceAccount
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: networking.k8s.io
      kind: IngressClass
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: ""
      kind: ResourceQuota
    # tailscale-operator 가 배포하는 cluster-scoped CR
    - group: tailscale.com
      kind: ProxyClass
    - group: tailscale.com
      kind: Connector
    - group: tailscale.com
      kind: DNSConfig
    - group: tailscale.com
      kind: ProxyGroup
    - group: tailscale.com
      kind: Recorder
