apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  description: Infrastructure components (sealed-secrets, traefik, tailscale-operator, cert-manager, cloudnative-pg)
  sourceRepos:
    - "https://github.com/ukkiee-dev/homelab.git"
    - "https://bitnami-labs.github.io/sealed-secrets"
    - "https://traefik.github.io/charts"
    - "https://pkgs.tailscale.com/helmcharts"
    - "ghcr.io/actions/actions-runner-controller-charts"
    # Phase 1 (CNPG migration): cert-manager Helm chart
    - "https://charts.jetstack.io"
    # Phase 2 (CNPG migration): CNPG operator Helm chart
    - "https://cloudnative-pg.github.io/charts"
  destinations:
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: traefik-system
      server: https://kubernetes.default.svc
    - namespace: tailscale-system
      server: https://kubernetes.default.svc
    - namespace: networking
      server: https://kubernetes.default.svc
    - namespace: actions-runner-system
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    # scheduling application 이 전역 ResourceQuota/LimitRange 를 각 워크로드
    # 네임스페이스에 배포하기 위해 destinations 확장. apps/monitoring/test-web
    # 네임스페이스의 정책만 `infra` project 가 소유한다 — 실제 앱 배포는
    # 각각 apps/monitoring project 에서 수행된다.
    - namespace: apps
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    # Phase 1 (CNPG migration): cert-manager 전용 namespace
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    # Phase 2 (CNPG migration): operator + plugin 전용 namespace
    - namespace: cnpg-system
      server: https://kubernetes.default.svc
    # Phase 6 hotfix: scheduling Application (project=infra) 이 ResourceQuota/LimitRange 를
    # 각 앱 namespace 에 배포한다. Phase 6 PR #10 에서 apps AppProject 에만 pokopia-wiki
    # destination 을 추가했지만 infra 에도 필요 (scheduling 거부 방지).
    - namespace: pokopia-wiki
      server: https://kubernetes.default.svc
    - namespace: test-phase3b
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: ServiceAccount
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: networking.k8s.io
      kind: IngressClass
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: ""
      kind: ResourceQuota
    # tailscale-operator 가 배포하는 cluster-scoped CR
    - group: tailscale.com
      kind: ProxyClass
    - group: tailscale.com
      kind: Connector
    - group: tailscale.com
      kind: DNSConfig
    - group: tailscale.com
      kind: ProxyGroup
    - group: tailscale.com
      kind: Recorder
    # Phase 1+ (CNPG migration): cert-manager cluster-scoped CR.
    # Issuer/Certificate/CertificateRequest/Order/Challenge 는 모두 namespace-scoped 라 whitelist 불필요.
    # ClusterIssuer 는 Phase 8 도입 예정이지만 사전 등재하여 나중에 whitelist 추가 PR 불필요.
    - group: cert-manager.io
      kind: ClusterIssuer
  # Phase 2 (CNPG migration): CNPG operator + plugin-barman-cloud cluster-scoped 리소스는
  # 기존 apiextensions.k8s.io/CustomResourceDefinition + rbac.authorization.k8s.io/ClusterRole+ClusterRoleBinding +
  # admissionregistration.k8s.io/Validating+MutatingWebhookConfiguration whitelist 로 모두 커버.
  # postgresql.cnpg.io/* · barmancloud.cnpg.io/* CR 은 namespace-scoped 로 apps AppProject 범위.
