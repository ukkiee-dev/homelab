# ArgoCD Helm Values
# helm repo add argo https://argoproj.github.io/argo-helm
# helm install argocd argo/argo-cd -n argocd -f values.yaml

configs:
  cm:
    url: https://argo.ukkiee.dev
    # accounts.ukkiee는 argocd-server가 직접 관리 (Helm field manager 충돌 방지)
  rbac:
    policy.csv: |
      g, ukkiee, role:admin

global:
  priorityClassName: infra-critical

server:
  extraArgs:
    - --insecure  # Traefik handles TLS
  resources:
    requests:
      cpu: 25m
      memory: 48Mi
    limits:
      cpu: 200m
      memory: 96Mi

controller:
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi

repoServer:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 24Mi

dex:
  enabled: false

notifications:
  enabled: false

applicationSet:
  enabled: false
