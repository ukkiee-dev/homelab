# ArgoCD Helm Values
# helm repo add argo https://argoproj.github.io/argo-helm
# helm install argocd argo/argo-cd -n argocd -f values.yaml

configs:
  cm:
    url: https://argo.ukkiee.dev
    accounts.ukkiee: apiKey, login
  rbac:
    policy.csv: |
      g, ukkiee, role:admin

global:
  priorityClassName: infra-critical

server:
  extraArgs:
    - --insecure  # Traefik handles TLS
  deploymentStrategy:
    type: Recreate
  resources:
    requests:
      cpu: 25m
      memory: 48Mi
    limits:
      cpu: 200m
      memory: 96Mi

controller:
  deploymentStrategy:
    type: Recreate
  resources:
    requests:
      cpu: 100m
      memory: 320Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  deploymentStrategy:
    type: Recreate
  resources:
    requests:
      cpu: 25m
      memory: 48Mi
    limits:
      cpu: 200m
      memory: 96Mi

redis:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 24Mi

dex:
  enabled: false

notifications:
  enabled: false

applicationSet:
  enabled: false
