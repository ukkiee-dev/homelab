apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  description: User applications (adguard, homepage, uptime-kuma, postgresql, test-web, pokopia-wiki)
  sourceRepos:
    - "https://github.com/ukkiee-dev/homelab.git"
    - "ghcr.io/ukkiee-dev/*"
  destinations:
    - namespace: apps
      server: https://kubernetes.default.svc
    - namespace: test-web
      server: https://kubernetes.default.svc
    # Phase 6 (CNPG migration): 첫 CNPG 실 프로젝트 (리뷰 H1 반영)
    - namespace: pokopia-wiki
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: PersistentVolume    # 외장 SSD 기반 hostPath PV (postgresql-backup)
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: storage.k8s.io
      kind: StorageClass         # external-ssd StorageClass (no-provisioner, WaitForFirstConsumer)
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
