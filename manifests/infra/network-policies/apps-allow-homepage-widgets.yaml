apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homepage-widget-egress
  namespace: apps
  labels:
    app.kubernetes.io/name: network-policies
    app.kubernetes.io/component: networking
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homepage
  policyTypes:
    - Egress
  egress:
    # Allow Homepage to reach AdGuard API
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: adguard
      ports:
        - protocol: TCP
          port: 3000
    # Allow Homepage to reach Uptime Kuma API
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: uptime-kuma
      ports:
        - protocol: TCP
          port: 3001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homepage-widget-ingress
  namespace: apps
  labels:
    app.kubernetes.io/name: network-policies
    app.kubernetes.io/component: networking
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - adguard
          - uptime-kuma
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress from Homepage for widget API calls
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homepage
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3001
