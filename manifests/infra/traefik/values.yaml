# Traefik Helm Chart Values (OrbStack K8s)

deployment:
  replicas: 1
  initContainers:
    - name: fix-acme-permissions
      image: busybox:1.36
      command:
        - sh
        - -c
        - "touch /letsencrypt/acme.json && chmod 600 /letsencrypt/acme.json && chown 65532:65532 /letsencrypt/acme.json"
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      volumeMounts:
        - name: letsencrypt
          mountPath: /letsencrypt

image:
  tag: "v3.3"

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
    # HTTP->HTTPS redirect disabled
    # Cloudflare Tunnel forwards to http://traefik:80
    # Redirecting would cause infinite loop. TLS handled at Cloudflare Edge.
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
  metrics:
    port: 9100
    expose:
      default: false
    exposedPort: 9100
    protocol: TCP


additionalArguments:
  - "--certificatesresolvers.cloudflare.acme.email=admin@ukkiee.dev"
  - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
  - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
  - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
  - "--api.dashboard=true"
  - "--ping=true"
  - "--log.level=WARN"
  - "--accesslog=true"
  - "--accesslog.format=json"
  - "--accesslog.fields.headers.names.CF-Connecting-IP=keep"
  - "--accesslog.fields.headers.names.User-Agent=keep"
  - "--entrypoints.websecure.http.tls=true"
  - "--entrypoints.websecure.http.tls.certresolver=cloudflare"
  - "--entrypoints.websecure.http.tls.domains[0].main=ukkiee.dev"
  - "--entrypoints.websecure.http.tls.domains[0].sans=*.ukkiee.dev"

env:
  - name: CF_DNS_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: traefik
        key: kv-api-token

persistence:
  enabled: true
  name: letsencrypt
  path: /letsencrypt
  size: 128Mi

ingressRoute:
  dashboard:
    enabled: false

securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true

podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

priorityClassName: infra-critical

updateStrategy:
  type: Recreate

readinessProbe:
  failureThreshold: 3
  timeoutSeconds: 5

livenessProbe:
  failureThreshold: 5
  timeoutSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 48Mi
  limits:
    cpu: 400m
    memory: 128Mi


service:
  spec:
    externalTrafficPolicy: Local
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9100"
    prometheus.io/path: "/metrics"

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: false

# kubernetesIngress.enabled=false 이므로 IngressClass 리소스 불필요.
# ArgoCD AppProject 'infra'가 IngressClass 미허용이라 sync 실패 회피용.
ingressClass:
  enabled: false

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets: "0.1,0.3,1.2,5.0"
