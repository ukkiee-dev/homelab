apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cnpg-system

# multi-source ArgoCD Application pattern:
#   spec.sources[0] = cloudnative-pg Helm chart
#   spec.sources[1] = 이 디렉토리 (values.yaml 제공 + Kustomize overlay)
#
# Phase 0 Task 0.2 Step 3: chart 가 operator 메트릭용 Service 자동 생성 안 함 →
# Phase 5 Task 5.1.1 에서 metrics-service.yaml 을 이 resources 에 추가 예정.
resources:
  - namespace.yaml
  # Phase 5 Task 5.1.1 (리뷰 C3): chart 가 operator 메트릭 Service 자동 생성 안 함 → 수동 추가
  - metrics-service.yaml
