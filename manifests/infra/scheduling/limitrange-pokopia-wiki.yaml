apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: pokopia-wiki
spec:
  limits:
    - type: Container
      default:
        memory: 128Mi
      defaultRequest:
        memory: 64Mi
      max:
        # pg Cluster limit 512Mi 수용. 향후 Postgres GUC 튜닝 시 조정.
        memory: 1Gi
