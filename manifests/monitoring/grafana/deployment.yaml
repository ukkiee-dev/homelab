apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
      annotations:
        grafana-alerting-reload: "2026-04-23-alert-datasource-nodata-v1"
    spec:
      priorityClassName: core-services
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:12.0.0
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GRAFANA_ADMIN_USERNAME
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_INSTALL_PLUGINS
              value: victoriametrics-logs-datasource
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
            - name: GF_ALERTING_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.ukkiee.dev"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-secret
                  key: BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: telegram-secret
                  key: CHAT_ID
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            timeoutSeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: alerting
              mountPath: /etc/grafana/provisioning/alerting
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards-apps
              mountPath: /var/lib/grafana/dashboards/apps
              readOnly: true
            - name: dashboards-infra
              mountPath: /var/lib/grafana/dashboards/infra
              readOnly: true
            - name: dashboards-kubernetes
              mountPath: /var/lib/grafana/dashboards/kubernetes
              readOnly: true
            - name: dashboards-node
              mountPath: /var/lib/grafana/dashboards/node
              readOnly: true
            - name: dashboards-workload
              mountPath: /var/lib/grafana/dashboards/workload
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: alerting
          configMap:
            name: grafana-alerting
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards-apps
          configMap:
            name: grafana-dashboards-apps
        - name: dashboards-infra
          configMap:
            name: grafana-dashboards-infra
        - name: dashboards-kubernetes
          configMap:
            name: grafana-dashboards-kubernetes
        - name: dashboards-node
          configMap:
            name: grafana-dashboards-node
        - name: dashboards-workload
          configMap:
            name: grafana-dashboards-workload
