          - uid: traefik-scrape-down
            title: Traefik scrape target Down
            # 5분 이상 /metrics scrape 실패. 메트릭 부재 자체를 감지하므로
            # traefik-config-reload-failed 와 상호보완 관계.
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: up{app_kubernetes_io_name="traefik",namespace="traefik-system"} == 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Traefik /metrics scrape 5분간 실패 — 메트릭 수집 중단"
              dashboardUid: "infra-alerts-overview"
              panelId: "1"

          - uid: traefik-reload-heartbeat
            title: Traefik reload heartbeat 정체
            # 24시간 이상 reload 이벤트가 전혀 없음 = provider watch 고장 또는
            # kubernetescrd informer 데드락 신호. symptom 이 아닌 liveness 검증용.
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 86400
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (time() - traefik_config_last_reload_success{app_kubernetes_io_name="traefik",namespace="traefik-system"}) > 86400
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 86400
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 86400
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Traefik config reload 24시간 정체 — provider watch 고장 의심"
              dashboardUid: "infra-alerts-overview"
              panelId: "1"

          - uid: traefik-config-error-log
            title: Traefik config/provider 에러 로그 폭증
            # VictoriaLogs LogsQL 기반. config/router/provider 빌드 실패 메시지
            # 패턴을 5분 rate 로 집계. reload counter 가 실패 시 증가하는지
            # 불확실한 v3 상황에서 reload 실패 감지의 primary 채널로 운용.
            # NOTE: 해당 datasource 가 Grafana unified alerting 과 호환되는지
            # 최초 발화 시 검증 필요 — 로그 확인 후 유효하지 않으면 제거.
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victorialogs
                model:
                  expr: '{app_kubernetes_io_name="traefik",namespace="traefik-system"} AND level:error AND (msg:"Error while building" OR msg:"Error starting provider aggregator" OR msg:"cannot retrieve the providers" OR msg:"Cannot create service" OR msg:"Cannot build the router") | stats count() as errors'
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Traefik config/router 빌드 에러 로그 5분간 {{ $value }}건 — reload 실패 가능"
              dashboardUid: "infra-alerts-overview"
              panelId: "1"
