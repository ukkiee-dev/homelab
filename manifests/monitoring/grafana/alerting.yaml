          - uid: traefik-config-reload-failed
            title: Traefik 설정 reload 실패
            condition: C
            # startup grace period(15분) 추가로 파드 부팅 직후 reload burst 와 [10m]
            # increase 윈도우 경계에서 생기는 false positive 를 차단.
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (time() - traefik_config_last_reload_success > 600) and (increase(traefik_config_reloads_total[10m]) > 0) and (time() - max(process_start_time_seconds{app_kubernetes_io_name="traefik",namespace="traefik-system"}) > 900)
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Traefik 설정 reload 10분간 실패 — IngressRoute 변경 반영 안 됨"
              dashboardUid: "infra-alerts-overview"
              panelId: "1"

      - orgId: 1
        name: extra-warning-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: pvc-not-bound
            title: PVC 미Bound 상태
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_persistentvolumeclaim_status_phase{phase=~"Pending|Lost"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
