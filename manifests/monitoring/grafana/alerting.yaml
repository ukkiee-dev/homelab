                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (traefik_tls_certs_not_after - time()) / 86400 < 7
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "TLS 인증서 {{ $labels.cn }} 만료 {{ $value | humanize }}일 전 — Traefik ACME 갱신 실패 의심"
              dashboardUid: "infra-alerts-overview"
