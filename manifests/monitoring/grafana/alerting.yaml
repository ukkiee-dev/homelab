apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Telegram
        receivers:
          - uid: telegram
            type: telegram
            settings:
              bottoken: $TELEGRAM_BOT_TOKEN
              chatid: "$TELEGRAM_CHAT_ID"
              parse_mode: HTML
              disable_web_page_preview: true
              message: |
                {{ if .Alerts.Firing }}🚨 <b>장애 발생</b> ({{ .Alerts.Firing | len }}건){{ range .Alerts.Firing }}
                ⚠️ <b>{{ .Labels.alertname }}</b>
                {{ if .Labels.namespace }}📍 {{ .Labels.namespace }}{{ if .Labels.pod }} / {{ .Labels.pod }}{{ end }}{{ if .Labels.deployment }} / {{ .Labels.deployment }}{{ end }}
                {{ else if .Labels.instance }}📍 {{ .Labels.instance }}
                {{ end }}{{ if .Labels.container }}📦 {{ .Labels.container }}
                {{ end }}🏷 {{ if eq .Labels.severity "critical" }}치명적{{ else if eq .Labels.severity "warning" }}경고{{ else }}{{ .Labels.severity }}{{ end }}
                📝 {{ .Annotations.summary }}
                <a href="{{ .GeneratorURL }}">상세보기</a> · <a href="{{ .SilenceURL }}">알림 끄기</a>{{ end }}
                {{ end }}{{ if .Alerts.Resolved }}✅ <b>복구 완료</b> ({{ .Alerts.Resolved | len }}건){{ range .Alerts.Resolved }}
                ✅ <b>{{ .Labels.alertname }}</b>
                {{ if .Labels.namespace }}📍 {{ .Labels.namespace }}{{ if .Labels.pod }} / {{ .Labels.pod }}{{ end }}
                {{ end }}📝 {{ .Annotations.summary }}{{ end }}
                {{ end }}
            disableResolveMessage: false

  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Telegram
        group_by:
          - grafana_folder
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: pod-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: pod-crash-looping
            title: Pod 재시작 반복
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: increase(kube_pod_container_status_restarts_total[10m])
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 3
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 재시작 반복 중"

          - uid: pod-not-ready
            title: Pod 미준비
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_pod_status_phase{phase=~"Pending|Unknown|Failed"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 상태: {{ $labels.phase }}"

          - uid: deployment-replicas-mismatch
            title: 레플리카 불일치
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_deployment_spec_replicas - kube_deployment_status_ready_replicas > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} 레플리카 불일치"

          - uid: container-oom-killed
            title: OOM 종료
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} 메모리 부족 종료 (OOMKilled)"

      - orgId: 1
        name: node-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: node-memory-high
            title: 노드 메모리 과다
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 85
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "노드 메모리 사용률 85% 초과"

          - uid: node-disk-high
            title: 노드 디스크 과다
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) * 100
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 85
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "노드 디스크 사용률 85% 초과"

          - uid: node-cpu-high
            title: 노드 CPU 과다
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 90
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "노드 CPU 사용률 90% 초과"
