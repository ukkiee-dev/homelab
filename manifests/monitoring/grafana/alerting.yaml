apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
data:
  contactpoints.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Telegram
        receivers:
          - uid: telegram
            type: telegram
            settings:
              bottoken: $TELEGRAM_BOT_TOKEN
              chatid: "8001733025"
              parse_mode: HTML
              disable_web_page_preview: true
              message: |
                {{ if .Alerts.Firing }}🚨 <b>장애 발생</b> ({{ .Alerts.Firing | len }}건){{ range .Alerts.Firing }}
                ⚠️ <b>{{ .Labels.alertname }}</b>
                {{ if .Labels.namespace }}📍 {{ .Labels.namespace }}{{ if .Labels.pod }} / {{ .Labels.pod }}{{ end }}{{ if .Labels.deployment }} / {{ .Labels.deployment }}{{ end }}
                {{ else if .Labels.instance }}📍 {{ .Labels.instance }}
                {{ end }}{{ if .Labels.container }}📦 {{ .Labels.container }}
                {{ end }}🏷 {{ if eq .Labels.severity "critical" }}치명적{{ else if eq .Labels.severity "warning" }}경고{{ else }}{{ .Labels.severity }}{{ end }}
                📝 {{ .Annotations.summary }}
                <a href="{{ .GeneratorURL }}">상세보기</a> · <a href="{{ .SilenceURL }}">알림 끄기</a>{{ end }}
                {{ end }}{{ if .Alerts.Resolved }}✅ <b>복구 완료</b> ({{ .Alerts.Resolved | len }}건){{ range .Alerts.Resolved }}
                ✅ <b>{{ .Labels.alertname }}</b>
                {{ if .Labels.namespace }}📍 {{ .Labels.namespace }}{{ if .Labels.pod }} / {{ .Labels.pod }}{{ end }}
                {{ end }}📝 {{ .Annotations.summary }}{{ end }}
                {{ end }}
            disableResolveMessage: false

  policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Telegram
        group_by:
          - grafana_folder
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

  rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: pod-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: pod-crash-looping
            title: Pod 재시작 반복
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: increase(kube_pod_container_status_restarts_total[1h])
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 3600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 3600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 2
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 재시작 반복 중"
              dashboardUid: "k8s-namespaces"
              panelId: "75"

          - uid: pod-not-ready
            title: Pod 미준비
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_pod_status_phase{phase=~"Pending|Unknown|Failed"} > 0 unless on(namespace, pod) kube_pod_owner{owner_kind="Job"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 상태: {{ $labels.phase }}"
              dashboardUid: "k8s-namespaces"
              panelId: "83"

          - uid: deployment-replicas-mismatch
            title: 레플리카 불일치
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_deployment_spec_replicas - kube_deployment_status_ready_replicas > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} 레플리카 불일치"
              dashboardUid: "kube-state-metrics"
              panelId: "20"

          - uid: container-oom-killed
            title: OOM 종료
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} > 0 and on(namespace, pod, container) increase(kube_pod_container_status_restarts_total[10m]) > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.namespace }}/{{ $labels.pod }}/{{ $labels.container }} 메모리 부족 종료 (OOMKilled)"
              dashboardUid: "k8s-pods"
              panelId: "60"

      - orgId: 1
        name: infra-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: infra-pod-restart
            title: 인프라 파드 재시작
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 3600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: increase(kube_pod_container_status_restarts_total{namespace=~"networking|kube-system|traefik-system|tailscale-system|argocd|monitoring"}[1h])
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 3600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 3600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "인프라 파드 {{ $labels.namespace }}/{{ $labels.pod }} 재시작 감지 (1h 내)"
              dashboardUid: "k8s-namespaces"
              panelId: "75"

          - uid: cluster-mass-restart
            title: 클러스터 대량 재시작
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: count(max by(namespace, pod) (increase(kube_pod_container_status_restarts_total[5m])) > 0)
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 3
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "5분 내 {{ $value }}개 파드 동시 재시작 — K3s/OrbStack 재시작 의심"
              dashboardUid: "k8s-cluster-global"
              panelId: "88"

          - uid: coredns-restart
            title: CoreDNS 재시작
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: increase(kube_pod_container_status_restarts_total{namespace="kube-system", pod=~"coredns.*"}[10m]) > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "CoreDNS 재시작 감지 — DNS 의존 파드(cloudflared 등) 영향 가능"
              dashboardUid: "infra-coredns"
              panelId: "9"

      - orgId: 1
        name: node-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: node-memory-high
            title: 노드 메모리 과다
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 85
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "노드 메모리 사용률 85% 초과"
              dashboardUid: "k8s-nodes"
              panelId: "3"

          - uid: node-disk-high
            title: 노드 디스크 과다
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"}) * 100
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 85
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "노드 디스크 사용률 85% 초과"
              dashboardUid: "k8s-nodes"
              panelId: "33"

          - uid: node-cpu-high
            title: 노드 CPU 과다
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 90
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "노드 CPU 사용률 90% 초과"
              dashboardUid: "k8s-nodes"
              panelId: "2"

      - orgId: 1
        name: argocd-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: argocd-sync-failed
            title: ArgoCD Sync 실패
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: sum by(name) (increase(argocd_app_sync_total{phase="Failed"}[5m]))
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "ArgoCD Application {{ $labels.name }} sync 실패"
              dashboardUid: "infra-alerts-overview"
              panelId: "1"

          - uid: argocd-app-out-of-sync
            title: ArgoCD OutOfSync 지속
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: argocd_app_info{sync_status="OutOfSync"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "ArgoCD Application {{ $labels.name }} 15분 이상 OutOfSync"
              dashboardUid: "infra-alerts-overview"
              panelId: "1"

          - uid: argocd-app-degraded
            title: ArgoCD Application Degraded
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: argocd_app_info{health_status="Degraded"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "ArgoCD Application {{ $labels.name }} Degraded 상태"
              dashboardUid: "infra-alerts-overview"
              panelId: "1"

      - orgId: 1
        name: backup-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: postgresql-backup-failed
            title: PostgreSQL 백업 실패
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: max_over_time(kube_job_status_failed{job_name=~"postgresql-backup-.*"}[15m])
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL 백업 Job {{ $labels.job_name }} 실패 — R2 오프사이트/로컬 SSD 백업 둘 다 누락"
              dashboardUid: "k8s-namespaces"
              panelId: "75"

          - uid: postgresql-backup-missing
            title: PostgreSQL 백업 누락 (25h+)
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: time() - kube_cronjob_status_last_successful_time{cronjob="postgresql-backup"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 90000
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL 백업 CronJob이 25시간 이상 성공하지 못함 — RPO 위반 (1일 스케줄 기준)"
              dashboardUid: "k8s-namespaces"
              panelId: "75"

          - uid: postgresql-backup-suspended
            title: PostgreSQL 백업 Suspend 상태
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_cronjob_spec_suspend{cronjob="postgresql-backup"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL 백업 CronJob이 Suspend 상태 — 의도된 것이 아니면 즉시 해제 필요"
              dashboardUid: "k8s-namespaces"
              panelId: "75"

      - orgId: 1
        name: critical-alerts
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: node-not-ready
            title: 노드 Ready=false
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: kube_node_status_condition{condition="Ready",status="true"} == 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "노드 {{ $labels.node }} Ready=false — 단일 노드 홈랩에서 전체 장애 위험"
              dashboardUid: "k8s-nodes"
              panelId: "3"

          - uid: node-filesystem-readonly
            title: 노드 루트 파일시스템 Read-Only
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: node_filesystem_readonly{mountpoint="/"} == 1
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "노드 {{ $labels.instance }} 루트 파일시스템 Read-Only 전환 — btrfs RO 의심"
