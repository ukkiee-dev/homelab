          # ------------------------------------------------------------------
          # postgresql-db-down
          # 활성화하려면 postgres-exporter 배포 또는 sidecar metrics 확인 필요.
          # 감사 시점(2026-04-20) VM 확인 결과 pg_up=1 수집 중이나, 일부 환경에서
          # exporter가 제거·교체되면 메트릭이 사라져 알람이 silent가 됨.
          # 배포 시 pg_up 메트릭 존재 여부 확인 후 주석 해제.
          # ------------------------------------------------------------------
          - uid: postgresql-db-down
            title: PostgreSQL 응답 없음
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: pg_up == 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - -1
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL {{ $labels.instance }} 쿼리 응답 없음 (pg_up=0)"
              dashboardUid: "k8s-namespaces"
              panelId: "83"

          # ------------------------------------------------------------------
          # postgresql-connections-high
          # pg_stat_activity_count / pg_settings_max_connections 메트릭 필요.
          # postgres-exporter 미배포 환경에서는 두 메트릭 모두 없어 NoData → OK로 빠짐.
          # 활성화하려면 postgres-exporter의 default-queries 또는 custom-queries로
          # pg_stat_activity / pg_settings 수집 설정 선행 필요.
          # ------------------------------------------------------------------
          - uid: postgresql-connections-high
            title: PostgreSQL 연결 수 과다
            condition: C
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: sum by(instance)(pg_stat_activity_count) / on(instance) pg_settings_max_connections
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator:
                        type: gt
                        params:
                          - 0.8
                  refId: C
            noDataState: OK
            execErrState: Error
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL 연결 수 {{ $value | humanizePercentage }} (max_connections 의 80% 초과)"
              dashboardUid: "k8s-namespaces"
              panelId: "83"

          - uid: coredns-servfail-rate-high
            title: CoreDNS SERVFAIL 과다
            condition: C
