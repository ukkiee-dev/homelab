apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-metrics
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: victoria-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoria-metrics
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
    spec:
      priorityClassName: core-services
      serviceAccountName: victoria-metrics
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:v1.118.0
          args:
            - -retentionPeriod=30d
            - -memory.allowedPercent=60
            - -search.maxMemoryPerQuery=134217728
            - -storageDataPath=/data
            - -httpListenAddr=:8428
            - -promscrape.config=/etc/victoria-metrics/scrape.yml
          ports:
            - name: http
              containerPort: 8428
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 224Mi
            limits:
              cpu: 500m
              memory: 320Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
            - name: scrape-config
              mountPath: /etc/victoria-metrics
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoria-metrics-data
        - name: scrape-config
          configMap:
            name: victoria-metrics-config
