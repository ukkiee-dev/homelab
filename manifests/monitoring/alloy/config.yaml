apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
data:
  config.alloy: |
    // Log collection from K8s pods
    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.process.parse_level.receiver]
    }

    // Extract log level from common formats and promote to label.
    // Supports JSON (`{"level":"info"}`) and logfmt (`level=info`).
    loki.process "parse_level" {
      forward_to = [loki.write.victorialogs.receiver]

      // JSON structured logs -> level field
      stage.json {
        expressions = {
          level_json = "level",
        }
      }

      // logfmt style -> level=info
      stage.regex {
        expression = "level=(?P<level_logfmt>(?i)debug|info|warn|warning|error|fatal|trace)"
      }

      // Coalesce into single extracted value, normalize to lowercase.
      stage.template {
        source   = "level"
        template = "{{ or .level_json .level_logfmt | lower }}"
      }

      // Promote extracted value to a VL label.
      stage.labels {
        values = {
          level = "",
        }
      }
    }

    loki.write "victorialogs" {
      endpoint {
        url = "http://victoria-logs.monitoring:9428/insert/loki/api/v1/push"
      }
    }

    // Metrics: remote write to VictoriaMetrics
    prometheus.remote_write "victoriametrics" {
      endpoint {
        url = "http://victoria-metrics.monitoring:8428/api/v1/write"
      }
    }
