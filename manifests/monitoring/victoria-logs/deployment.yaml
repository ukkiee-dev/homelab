apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoria-logs
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
    spec:
      priorityClassName: core-services
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: victoria-logs
          image: victoriametrics/victoria-logs:v1.19.0-victorialogs
          args:
            - -retentionPeriod=15d
            - -storageDataPath=/data
            - -httpListenAddr=:9428
          ports:
            - name: http
              containerPort: 9428
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 24Mi
            limits:
              cpu: 200m
              memory: 32Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 9428
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 9428
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoria-logs-data
